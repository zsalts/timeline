name: Deploy a GitHub Pages

on:
  push:
    branches: ["main"]
  # Permite disparar el deploy a mano desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; los que queden en cola se cancelan (no se apilan)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el contenido de app/ como artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "app"

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
