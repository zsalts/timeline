<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartido - Timeline</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/png" href="../assets/image/logo-web.png">
    <link rel="apple-touch-icon" href="../assets/image/logo-web.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/utils/tema.js"></script>
    <style>
        body.app-shell .container-dashboard { max-width: 1500px; }

        #titulo-partido {
            color: var(--text);
            margin: 0 0 4px;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .de-quien {
            font-family: var(--font-mono); font-size: 0.72rem;
            letter-spacing: 0.08em; color: var(--muted); margin: 0 0 4px;
        }
        .de-quien b { color: var(--accent); font-weight: 600; }

        #tl-header { margin: 14px 0 22px; }
        #tl-header .tl-strip { height: 32px; }
        #tl-header .tl-caption {
            display: flex; justify-content: space-between;
            font-family: var(--font-mono); font-size: 0.66rem;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--faint); margin-bottom: 7px;
        }

        .layout-principal { display: flex; flex-direction: row; gap: 22px; align-items: stretch; width: 100%; }
        .columna-izquierda { width: 60%; display: flex; flex-direction: column; gap: 15px; }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
        }
        .video-wrapper iframe { width: 100% !important; height: 100% !important; border: none; }

        .columna-derecha-wrapper { width: 40%; position: relative; }
        .columna-cortes-scroll {
            position: absolute; inset: 0; overflow-y: auto;
            background: var(--panel); border-radius: var(--radius);
            padding: 16px; border: 1px solid var(--line); box-sizing: border-box;
        }
        .cortes-title {
            margin: 0 0 14px; font-family: var(--font-mono); font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); font-weight: 500;
        }
        .columna-cortes-scroll::-webkit-scrollbar { width: 8px; }
        .columna-cortes-scroll::-webkit-scrollbar-track { background: transparent; }
        .columna-cortes-scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }

        .cat-details { background: var(--panel-2); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--line); }
        .cat-details > summary {
            background: var(--panel-3); color: var(--text);
            padding: 11px 14px; font-weight: 700; cursor: pointer; list-style: none;
            border-radius: 9px; font-size: 0.92rem;
        }
        .cat-details > summary::-webkit-details-marker { display: none; }
        .desc-details {
            margin: 8px; background: var(--panel); border-left: 3px solid var(--accent);
            border-radius: 6px; padding: 6px 12px;
        }
        .desc-details > summary { list-style: none; cursor: pointer; color: var(--muted); font-size: 0.82rem; padding: 4px 0; }
        .desc-details > summary::-webkit-details-marker { display: none; }

        .botones-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; padding: 10px 0; }
        .timestamp-btn {
            background: var(--panel-2); border: 1px solid var(--line-2); color: var(--text);
            padding: 8px; border-radius: 8px; font-family: var(--font-mono); font-weight: 500;
            font-size: 0.78rem; cursor: pointer; text-align: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .timestamp-btn:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

        @media (max-width: 800px) {
            .layout-principal { flex-direction: column; }
            .columna-izquierda, .columna-derecha-wrapper { width: 100%; }
            .columna-derecha-wrapper { height: 500px; }
        }
    </style>
</head>

<body>

    <div id="sidebar-root" data-active="historial"></div>
    <script src="../assets/js/components/ui.js"></script>

    <div class="container-dashboard">
        <div class="eyebrow">Video compartido</div>
        <h2 id="titulo-partido">Cargando…</h2>
        <p class="de-quien" id="de-quien"></p>

        <div id="tl-header">
            <div class="tl-caption"><span>Línea de tiempo</span><span id="tl-count"></span></div>
            <div id="tl-slot"></div>
        </div>

        <div class="layout-principal">
            <div class="columna-izquierda">
                <div class="video-wrapper">
                    <div id="player"></div>
                </div>
            </div>

            <div class="columna-derecha-wrapper">
                <div class="columna-cortes-scroll">
                    <h3 class="cortes-title">Cortes compartidos</h3>
                    <div id="cortes-container">
                        <p style="color: var(--muted);">Cargando cortes…</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Módulos compartidos -->
    <script src="../assets/js/utils/youtube.js"></script>
    <script src="../assets/js/components/cortesRenderer.js"></script>
    <script src="../assets/js/components/timeline.js"></script>

    <script type="module">
        import { db, doc, getDoc } from '../assets/js/firebase.js';

        // Cualquier cuenta logueada puede ver lo que le compartieron
        // (incluidas las jugadoras: el envío es una decisión del analista).
        const uid = sessionStorage.getItem('usuarioUID');
        if (!uid) {
            window.location.href = "login.html";
        }

        let player;
        let videoIdLimpio = '';
        const compartidoId = sessionStorage.getItem('compartidoSeleccionadoId');

        window.onYouTubeIframeAPIReady = () => {
            if (videoIdLimpio) {
                player = new YT.Player('player', {
                    height: '360',
                    width: '100%',
                    videoId: videoIdLimpio,
                    playerVars: {
                        'playsinline': 1,
                        'origin': window.location.origin
                    }
                });
            }
        };

        async function cargarCompartido() {
            if (!compartidoId) {
                window.location.href = "historial.html";
                return;
            }

            try {
                const snap = await getDoc(doc(db, "compartidos", compartidoId));
                if (!snap.exists()) {
                    document.getElementById('titulo-partido').textContent = "Este compartido ya no existe.";
                    return;
                }

                const item = snap.data();
                const eq1 = item.mi_equipo || 'Equipo 1';
                const eq2 = item.rival || 'Equipo 2';
                document.getElementById('titulo-partido').textContent = `${eq1} vs ${eq2}`;
                document.getElementById('de-quien').innerHTML =
                    `Compartido por <b>${item.de_email || 'otra cuenta'}</b> · ${item.torneo || 'Amistoso'} · ${item.fecha || 'sin fecha'}`;

                const res = TL.timeline.resumen(item.estadisticas);
                document.getElementById('tl-count').textContent =
                    `${res.total} cortes · ${res.categorias} categorías`;
                document.getElementById('tl-slot').appendChild(TL.timeline.crear(item.estadisticas));

                videoIdLimpio = TL.youtube.extraerId(item.youtube_id || '');
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);

                TL.cortes.render(
                    document.getElementById('cortes-container'),
                    item.estadisticas,
                    (t) => { if (player) player.seekTo(t, true); },
                    { label: (num) => `▶ ${num}` }
                );
            } catch (error) {
                console.error("Error al cargar el compartido:", error);
                document.getElementById('titulo-partido').textContent = "No tenés acceso a este compartido.";
            }
        }

        cargarCompartido();
    </script>
</body>

</html>
