<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparar - Timeline</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="../assets/image/logo-web.png">
    <link rel="apple-touch-icon" href="../assets/image/logo-web.png">
    <meta name="theme-color" content="#0B0E13">

    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/utils/tema.js"></script>
    <style>
        /* Ocupa exactamente la altura de la ventana en desktop */
        body.app-shell { overflow: hidden; }
        body.app-shell .container-dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 28px 32px;
            box-sizing: border-box;
            overflow: hidden;
        }

        @media (max-width: 900px) {
            body.app-shell { overflow: visible; }
            body.app-shell .container-dashboard { height: auto; overflow: visible; }
        }

        .header-stats { flex-shrink: 0; margin-bottom: 16px; }

        .header-acciones {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* --- FILA DE VIDEOS (arriba) --- */
        .videos-row {
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        @media (max-width: 900px) {
            .videos-row { flex-direction: column; overflow-x: visible; }
        }

        .video-columna {
            flex: 1 1 380px;
            max-width: 560px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--panel);
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
        }

        @media (max-width: 900px) {
            .video-columna { max-width: 100%; min-width: 100%; }
        }

        .video-columna-head { display: flex; gap: 8px; align-items: center; }

        /* Etiqueta V1 / V2… al lado del selector */
        .video-tag {
            flex-shrink: 0;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-weight: 700; font-size: 0.85rem;
            color: var(--bg); background: var(--faint);
        }

        .btn-elegir {
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line-2);
            background: var(--panel-2);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            flex: 1;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: border-color 0.15s, background 0.15s;
            font-family: inherit;
        }
        .btn-elegir:hover { border-color: var(--accent-line); background: var(--panel-3); }

        .btn-eliminar-col {
            background: var(--panel-2);
            color: var(--muted);
            border: 1px solid var(--line-2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            transition: border-color 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .btn-eliminar-col:hover { border-color: var(--danger); color: var(--danger); }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--line);
        }
        .video-wrapper iframe { width: 100% !important; height: 100% !important; border: none; }

        /* --- PANEL ÚNICO DE CORTES (abajo) --- */
        .cortes-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            margin-top: 16px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
        }

        @media (max-width: 900px) {
            .cortes-panel { min-height: 420px; }
        }

        .cortes-panel-head {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 16px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }
        .cortes-panel-head h3 {
            margin: 0; font-family: var(--font-mono); font-size: 0.72rem;
            text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); font-weight: 500;
        }

        .leyenda-videos { display: flex; flex-wrap: wrap; gap: 8px; }
        .leyenda-chip {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.78rem; color: var(--muted);
        }
        .leyenda-chip b {
            width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
            border-radius: 5px; font-family: var(--font-mono); font-size: 0.72rem; color: var(--bg);
        }

        .cortes-unificados {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
        }
        .cortes-unificados::-webkit-scrollbar { width: 8px; }
        .cortes-unificados::-webkit-scrollbar-track { background: transparent; }
        .cortes-unificados::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
        .cortes-unificados::-webkit-scrollbar-thumb:hover { background: var(--faint); }

        .videos-row::-webkit-scrollbar { height: 8px; }
        .videos-row::-webkit-scrollbar-track { background: transparent; }
        .videos-row::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }

        /* Fila de corte: número + botones por video */
        .corte-fila {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 4px;
        }
        .corte-num {
            flex-shrink: 0;
            min-width: 70px;
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted);
        }
        .corte-botones { display: flex; flex-wrap: wrap; gap: 6px; }
        .btn-video-corte {
            border: 1px solid; background: transparent;
            padding: 5px 10px; border-radius: 7px;
            font-family: var(--font-mono); font-weight: 600; font-size: 0.75rem;
            cursor: pointer; transition: filter 0.15s;
        }
        .btn-video-corte:hover { filter: brightness(1.25); }

        .cat-details { background: var(--panel-2); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--line); }
        .cat-details > summary {
            background: var(--panel-3); color: var(--text);
            padding: 10px 14px; font-weight: 700; cursor: pointer; list-style: none;
            border-radius: 9px; font-size: 0.88rem;
        }
        .cat-details > summary::-webkit-details-marker { display: none; }
        .desc-details {
            margin: 8px; background: var(--panel); border-left: 3px solid var(--accent);
            border-radius: 6px; padding: 4px 12px 8px;
        }
        .desc-details > summary { list-style: none; cursor: pointer; color: var(--muted); font-size: 0.82rem; padding: 6px 0; }
        .desc-details > summary::-webkit-details-marker { display: none; }

        /* --- MODAL DE SELECCIÓN --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4, 6, 10, 0.72);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--line);
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: var(--radius);
            padding: 22px;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .modal-content input { max-width: 100%; }
        .grid-partidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-top: 15px; }
    </style>
</head>

<body>

    <div id="sidebar-root" data-active="comparar"></div>
    <script src="../assets/js/components/ui.js"></script>

    <div class="container-dashboard">
        <div class="header-stats">
            <div class="header-acciones">
                <div>
                    <div class="eyebrow">Análisis comparado</div>
                    <h2 style="margin:0;">Comparar</h2>
                    <p class="subtitle" style="margin-top: 5px;">Sumá partidos y compará sus cortes con una sola lista: cada corte enlaza a cada video.</p>
                </div>
                <button id="btn-sumar-video" class="btn-primary" style="width: auto; padding: 10px 18px;">
                    + Sumar video
                </button>
            </div>
        </div>

        <div id="videos-row" class="videos-row"></div>

        <div class="cortes-panel">
            <div class="cortes-panel-head">
                <h3>Cortes</h3>
                <div id="leyenda-videos" class="leyenda-videos"></div>
            </div>
            <div id="cortes-unificados" class="cortes-unificados">
                <p style="text-align: center; color: var(--muted); margin-top: 24px;">Elegí al menos un partido para ver los cortes.</p>
            </div>
        </div>
    </div>

    <!-- VENTANA MODAL PARA ELEGIR PARTIDO -->
    <div id="modal-seleccion" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">Elegir partido</h2>
                <button onclick="cerrarModal()" class="btn-ghost" style="width: auto; padding: 8px 16px;">Cerrar</button>
            </div>

            <input type="text" id="buscador-modal" placeholder="Buscar por equipo o torneo">

            <div id="modal-grid-partidos" class="grid-partidos">
                <p style="color: var(--muted);">Cargando partidos…</p>
            </div>
        </div>
    </div>

    <!-- Módulos compartidos -->
    <script src="../assets/js/utils/youtube.js"></script>
    <script src="../assets/js/components/cortesRenderer.js"></script>
    <script src="../assets/js/components/timeline.js"></script>

    <script type="module">
        const uid = sessionStorage.getItem('usuarioUID');
        const clubId = sessionStorage.getItem('clubID');
        if (!uid || !clubId) {
            // Si no está logueado (o no tiene club), lo mandamos al login
            window.location.href = "login.html";
        }
        // Comparar es análisis del cuerpo técnico: las jugadoras no acceden ni por URL.
        if (sessionStorage.getItem('userRole') === 'player') {
            window.location.href = "historial.html";
        }
        import { db, collection, getDocs, query, where } from '../assets/js/firebase.js';

        // Paleta para distinguir cada video (V1, V2, …). Misma familia que las categorías.
        const COLORES_VIDEO = ['#56C2E6', '#F7C948', '#5FD3A6', '#F58BB4', '#A78BFA', '#FFB454'];

        let reproductoresYT = {};
        let partidosData = {};
        let partidosArreglo = [];
        let contadorColumnas = 0;
        let apiLista = false;
        let columnaActivaParaModal = null;
        let errorCargaHistorial = false;

        window.onYouTubeIframeAPIReady = () => { apiLista = true; };
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        async function inicializar() {
            try {
                // Solo los partidos de este club (multi-tenant)
                const consultaPrivada = query(collection(db, "partidos"), where("club_id", "==", clubId));
                const querySnapshot = await getDocs(consultaPrivada);
                partidosArreglo = [];

                querySnapshot.forEach(doc => {
                    const p = doc.data();
                    partidosData[doc.id] = p;
                    partidosArreglo.push({ id: doc.id, ...p });
                });

                partidosArreglo.sort((a, b) => {
                    const esImpA = !!a.importante;
                    const esImpB = !!b.importante;
                    if (esImpA !== esImpB) return esImpA ? -1 : 1;
                    return new Date(b.fecha || 0) - new Date(a.fecha || 0);
                });

                crearColumna();
                crearColumna();

            } catch (error) {
                console.error("Error al cargar partidos", error);
                errorCargaHistorial = true;
                // Aun si falló la carga del historial, dejamos crear columnas
                // vacías para que la página no quede en blanco sin explicación.
                document.getElementById('videos-row').innerHTML =
                    '<p style="color: var(--danger); padding: 20px;">No se pudo conectar con la nube para traer tus partidos. Recargá la página o revisá tu conexión.</p>';
            }
        }

        window.crearColumna = function () {
            contadorColumnas++;
            const colId = `col-${contadorColumnas}`;
            const colDiv = document.createElement('div');
            colDiv.className = 'video-columna';
            colDiv.id = colId;

            colDiv.innerHTML = `
                <div class="video-columna-head">
                    <span class="video-tag" data-tag>–</span>
                    <button id="btn-elegir-${colId}" class="btn-elegir" onclick="abrirModal('${colId}')">
                        Elegir partido…
                    </button>
                    <button class="btn-eliminar-col" onclick="eliminarColumna('${colId}')" title="Quitar video">✕</button>
                </div>
                <div class="video-wrapper">
                    <div id="player-${colId}"></div>
                </div>
            `;
            document.getElementById('videos-row').appendChild(colDiv);
            renderCortesUnificados();
        };

        window.eliminarColumna = function (colId) {
            const colDiv = document.getElementById(colId);
            if (colDiv) colDiv.remove();
            if (reproductoresYT[colId]) delete reproductoresYT[colId];
            renderCortesUnificados();
        };

        window.abrirModal = function (colId) {
            columnaActivaParaModal = colId;
            document.getElementById('modal-seleccion').style.display = 'flex';
            renderizarPartidosModal(partidosArreglo);
        };

        window.cerrarModal = function () {
            document.getElementById('modal-seleccion').style.display = 'none';
            columnaActivaParaModal = null;
        };

        function renderizarPartidosModal(lista) {
            const contenedor = document.getElementById('modal-grid-partidos');
            contenedor.innerHTML = '';

            if (lista.length === 0) {
                contenedor.innerHTML = errorCargaHistorial
                    ? '<p style="color: var(--danger);">No se pudo conectar con la nube. Cerrá esta ventana y recargá la página.</p>'
                    : '<p style="color: var(--muted);">No se encontraron partidos.</p>';
                return;
            }

            lista.forEach(partido => {
                const card = document.createElement('div');
                card.className = 'card-stat';

                const esImportante = !!partido.importante;
                const eq1 = partido.mi_equipo || 'Nuestro equipo';
                const eq2 = partido.rival || 'Rival';

                card.innerHTML = `
                    <div class="match-torneo">${partido.torneo || 'Amistoso'} ${esImportante ? '<span class="badge-proximo">PRÓXIMO</span>' : ''}</div>
                    <div class="match-teams" style="margin: 10px 0 4px;">
                        <div class="match-eq1" style="font-size: 1.05rem;">${eq1}</div>
                        <div class="match-vs">vs</div>
                        <div class="match-eq2" style="font-size: 0.92rem;">${eq2}</div>
                    </div>
                    <div class="match-fecha" style="margin-top: 8px; display: block;">${partido.fecha || 'Sin fecha'}</div>
                    <div class="tl-slot" style="margin-top: 10px;"></div>
                `;

                card.querySelector('.tl-slot').appendChild(TL.timeline.crear(partido.estadisticas));
                card.onclick = () => seleccionarPartidoParaColumna(partido.id);
                contenedor.appendChild(card);
            });
        }

        window.seleccionarPartidoParaColumna = function (partidoId) {
            if (!columnaActivaParaModal) return;

            const partido = partidosData[partidoId];
            const eq1 = partido.mi_equipo || 'Eq1';
            const eq2 = partido.rival || 'Eq2';

            const col = document.getElementById(columnaActivaParaModal);
            col.dataset.partidoId = partidoId;

            const btn = document.getElementById(`btn-elegir-${columnaActivaParaModal}`);
            btn.innerHTML = `${eq1} vs ${eq2} <span style="color: var(--muted); font-weight: normal; font-size: 0.8rem;">(${partido.fecha})</span>`;

            cargarPartidoEnColumna(partidoId, columnaActivaParaModal);
            cerrarModal();
        };

        document.getElementById('buscador-modal').addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase();
            const filtrados = partidosArreglo.filter(p =>
                (p.rival && p.rival.toLowerCase().includes(texto)) ||
                (p.mi_equipo && p.mi_equipo.toLowerCase().includes(texto)) ||
                (p.torneo && p.torneo.toLowerCase().includes(texto))
            );
            renderizarPartidosModal(filtrados);
        });

        document.getElementById('modal-seleccion').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-seleccion')) cerrarModal();
        });

        function cargarPartidoEnColumna(partidoId, colId) {
            const partido = partidosData[partidoId];
            const videoId = TL.youtube.extraerId(partido.youtube_id);

            if (apiLista) {
                if (reproductoresYT[colId]) {
                    reproductoresYT[colId].loadVideoById(videoId);
                } else {
                    reproductoresYT[colId] = new YT.Player(`player-${colId}`, {
                        videoId: videoId,
                        playerVars: { 'playsinline': 1 }
                    });
                }
            } else {
                setTimeout(() => cargarPartidoEnColumna(partidoId, colId), 500);
                return;
            }

            // Al cambiar/agregar un video, se rearma la lista única de cortes.
            renderCortesUnificados();
        }

        // Agrupa las estadísticas de un partido en categoria -> descriptor -> [{t, num}].
        // Misma lógica que cortesRenderer, para poder cruzar varios partidos.
        function agrupar(estadisticas) {
            const agrupado = {};
            if (!estadisticas) return agrupado;
            for (const [categoria, cortes] of Object.entries(estadisticas)) {
                agrupado[categoria] = {};
                cortes.forEach((corte, index) => {
                    const num = index + 1;
                    const descs = (corte.d && corte.d.length > 0) ? corte.d : ['General'];
                    descs.forEach(desc => {
                        if (!agrupado[categoria][desc]) agrupado[categoria][desc] = [];
                        agrupado[categoria][desc].push({ t: corte.t, num });
                    });
                });
            }
            return agrupado;
        }

        // Dibuja UNA sola lista de cortes. Cada corte muestra un botón por cada
        // video que tenga esa ocurrencia (V1, V2, …), y salta ese video a su segundo.
        function renderCortesUnificados() {
            const cont = document.getElementById('cortes-unificados');
            const leyenda = document.getElementById('leyenda-videos');

            // Videos seleccionados, en el orden en que aparecen en pantalla
            const videos = [];
            document.querySelectorAll('.video-columna').forEach(col => {
                const pid = col.dataset.partidoId;
                if (pid && partidosData[pid]) {
                    videos.push({ colId: col.id, partido: partidosData[pid] });
                }
            });

            // Actualizar etiquetas V1/V2 de cada columna y la leyenda
            document.querySelectorAll('.video-columna').forEach(col => {
                const tag = col.querySelector('[data-tag]');
                const idx = videos.findIndex(v => v.colId === col.id);
                if (idx === -1) {
                    tag.textContent = '–';
                    tag.style.background = 'var(--faint)';
                } else {
                    tag.textContent = 'V' + (idx + 1);
                    tag.style.background = COLORES_VIDEO[idx % COLORES_VIDEO.length];
                }
            });

            leyenda.innerHTML = videos.map((v, i) => {
                const p = v.partido;
                const nombre = `${p.mi_equipo || 'Eq1'} vs ${p.rival || 'Eq2'}`;
                const color = COLORES_VIDEO[i % COLORES_VIDEO.length];
                return `<span class="leyenda-chip"><b style="background:${color}">V${i + 1}</b> ${nombre}</span>`;
            }).join('');

            if (videos.length === 0) {
                cont.innerHTML = '<p style="text-align: center; color: var(--muted); margin-top: 24px;">Elegí al menos un partido para ver los cortes.</p>';
                return;
            }

            // Agrupar cada video y armar la unión de categorías/descriptores (la plantilla)
            const grupos = videos.map(v => agrupar(v.partido.estadisticas));

            const categorias = new Set();
            grupos.forEach(g => Object.keys(g).forEach(c => categorias.add(c)));

            if (categorias.size === 0) {
                cont.innerHTML = '<p style="text-align: center; color: var(--muted); margin-top: 24px;">Los partidos elegidos no tienen cortes.</p>';
                return;
            }

            cont.innerHTML = '';

            [...categorias].sort().forEach(cat => {
                const catDetails = document.createElement('details');
                catDetails.className = 'cat-details';
                // Colapsadas por defecto: el analista abre solo la categoría que
                // quiere comparar, en vez de ver toda la plantilla desplegada.
                catDetails.open = false;
                const catSummary = document.createElement('summary');
                catDetails.appendChild(catSummary);

                // Unión de descriptores de esta categoría entre todos los videos
                const descriptores = new Set();
                grupos.forEach(g => { if (g[cat]) Object.keys(g[cat]).forEach(d => descriptores.add(d)); });
                catSummary.innerHTML = `📁 ${cat} <span style="color:var(--faint); font-size:0.8rem; font-weight:500;">(${descriptores.size})</span>`;

                [...descriptores].sort().forEach(desc => {
                    const descDetails = document.createElement('details');
                    descDetails.className = 'desc-details';
                    descDetails.open = true;
                    const descSummary = document.createElement('summary');

                    // Cuántas ocurrencias como máximo tiene este descriptor entre los videos
                    const maxLen = Math.max(...grupos.map(g => (g[cat] && g[cat][desc]) ? g[cat][desc].length : 0));
                    descSummary.innerHTML = `📂 ${desc} <span style="color:var(--faint); font-size:0.8rem;">(${maxLen})</span>`;
                    descDetails.appendChild(descSummary);

                    for (let i = 0; i < maxLen; i++) {
                        const fila = document.createElement('div');
                        fila.className = 'corte-fila';

                        const numSpan = document.createElement('span');
                        numSpan.className = 'corte-num';
                        numSpan.textContent = `Corte ${i + 1}`;
                        fila.appendChild(numSpan);

                        const botones = document.createElement('div');
                        botones.className = 'corte-botones';

                        videos.forEach((v, vi) => {
                            const lista = grupos[vi][cat] && grupos[vi][cat][desc];
                            const corte = lista && lista[i];
                            if (!corte) return;
                            const color = COLORES_VIDEO[vi % COLORES_VIDEO.length];
                            const btn = document.createElement('button');
                            btn.className = 'btn-video-corte';
                            btn.style.color = color;
                            btn.style.borderColor = color;
                            btn.textContent = `▶ V${vi + 1}`;
                            const p = v.partido;
                            btn.title = `${p.mi_equipo || 'Eq1'} vs ${p.rival || 'Eq2'} · corte ${corte.num}`;
                            btn.onclick = () => {
                                const player = reproductoresYT[v.colId];
                                if (player && player.seekTo) player.seekTo(corte.t, true);
                            };
                            botones.appendChild(btn);
                        });

                        fila.appendChild(botones);
                        descDetails.appendChild(fila);
                    }
                    catDetails.appendChild(descDetails);
                });
                cont.appendChild(catDetails);
            });
        }

        document.getElementById('btn-sumar-video').addEventListener('click', () => crearColumna());

        inicializar();
    </script>
</body>
