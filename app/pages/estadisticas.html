<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Estadísticas - Timeline</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="../assets/image/logo-web.png">
    <link rel="apple-touch-icon" href="../assets/image/logo-web.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/utils/tema.js"></script>
    <style>
        body.app-shell .container-dashboard { max-width: 1400px; }

        .header-stats { text-align: center; display: block; margin-bottom: 24px; }
        .header-stats .eyebrow { justify-content: center; display: flex; }
        .header-stats h2 { font-size: 1.5rem; margin: 6px 0 4px; }
        .header-stats p { margin: 0; }

        .comparativa-container { display: flex; flex-direction: column; gap: 16px; margin-top: 10px; width: 100%; }
        .columna-equipo {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            align-content: start;
            padding: 16px;
            border-radius: var(--radius);
            background: var(--panel);
            border: 1px solid var(--line);
        }

        @media (min-width: 768px) {
            .comparativa-container { flex-direction: row; }
            .columna-equipo { grid-template-columns: repeat(2, 1fr); }
            .stat-card:last-child { grid-column: 1 / -1; justify-self: center; width: calc(50% - 5px); }
        }

        /* Títulos con el color de cada equipo: el nuestro en acento, el rival neutro */
        .titulo-nuestro, .titulo-rival {
            grid-column: 1 / -1;
            padding: 9px;
            text-align: center;
            margin-bottom: 0;
            font-weight: 700;
            font-size: 1rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .titulo-nuestro { background: var(--accent); color: var(--accent-ink); }
        .titulo-rival { background: var(--panel-3); color: var(--text); }

        .stat-card {
            background: var(--panel-2);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            border-left: 3px solid var(--line-2);
            display: flex;
            flex-direction: column;
        }
        .card-nuestro { border-left-color: var(--accent); }
        .card-rival { border-left-color: var(--faint); }

        .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 2px 5px; border-radius: 4px; }
        .stat-title { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
        .stat-total { font-size: 1.5rem; font-weight: 800; line-height: 1; color: var(--accent); font-family: var(--font-mono); }
        .stat-total.dark { color: var(--text); }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 5px;
            border-bottom: 1px dashed var(--line);
            font-size: 0.75rem;
            font-family: var(--font-mono);
            border-radius: 4px;
            margin-bottom: 1px;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-row .label { color: var(--muted); font-family: var(--font-sans); }
        .stat-row .value { font-weight: 600; font-size: 0.85rem; color: var(--text); }

        .winner-bg { background-color: var(--accent-dim) !important; border-bottom: none; }
    </style>
</head>

<body>

    <div id="sidebar-root" data-active="estadisticas"></div>
    <script src="../assets/js/components/ui.js"></script>

    <div class="container-dashboard">
        <div class="header-stats">
            <div class="eyebrow">Panel de control</div>
            <h2 id="header-rival">Comparativa</h2>
            <p class="subtitle">Análisis comparativo de rendimiento</p>
        </div>

        <div id="panel-estadisticas" class="comparativa-container">
        </div>
    </div>

    <script type="module">
        const uid = sessionStorage.getItem('usuarioUID');
        if (!uid) {
            // Si no está logueado, lo mandamos al login
            window.location.href = "login.html";
        }
        import { db, doc, getDoc } from '../assets/js/firebase.js';

        function limpiar(texto) {
            return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        }

        const win = (a, b) => a > b ? 'winner-bg' : '';

        async function cargarPanel() {
            const partidoId = sessionStorage.getItem('partidoSeleccionadoId');
            if (!partidoId) {
                window.location.href = "../index.html";
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "partidos", partidoId));

                if (docSnap.exists()) {
                    const partido = docSnap.data();

                    const eq1 = partido.mi_equipo || 'NUESTRO EQUIPO';
                    const eq2 = partido.rival || 'EQUIPO RIVAL';

                    document.getElementById('header-rival').textContent = `Comparativa: ${eq1} vs ${eq2}`;

                    const est = partido.estadisticas;

                    if (!est) {
                        document.getElementById('panel-estadisticas').innerHTML = "<p style='text-align:center; width:100%; font-weight:600; color:var(--muted);'>Este partido todavía no tiene estadísticas cargadas.</p>";
                        return;
                    }

                    // Contadores Nuestros
                    let accionesNuestras = 0;
                    let ccNuestros = 0; const ccNuestrosTipos = { 'directo': 0, 'jugado': 0 };
                    let golesCC = 0, golesJugada = 0;
                    let ingresosNuestrosTotal = 0; const ingresosNuestrosTipo = { 'flick': 0, 'penetracion': 0, 'pase': 0 };
                    let tirosNuestrosTotal = 0; const tirosNuestrosResultado = { 'gol': 0, 'atajada': 0, 'afuera': 0 };
                    let recupTotal = 0; const recupZonas = { 'C1': 0, 'C2': 0, 'C3': 0, 'C4': 0, 'Sin zona': 0 };
                    let libres25Nuestros = 0;
                    let libres50Nuestros = 0;

                    // Contadores Rivales
                    let accionesRivales = 0;
                    let ccRivales = 0; const ccRivalesTipos = { 'directo': 0, 'jugado': 0 };
                    let golesContraCC = 0, golesContraJugada = 0;
                    let ingresosRivalesTotal = 0; const ingresosRivalesTipo = { 'flick': 0, 'penetracion': 0, 'pase': 0 };
                    let tirosRivalesTotal = 0; const tirosRivalesResultado = { 'gol': 0, 'atajada': 0, 'afuera': 0 };
                    let perdidasTotal = 0; const perdidasZonas = { 'C1': 0, 'C2': 0, 'C3': 0, 'C4': 0, 'Sin zona': 0 };
                    let libres25Rivales = 0;
                    let libres50Rivales = 0;

                    for (const [categoriaReal, cortes] of Object.entries(est)) {
                        const cat = limpiar(categoriaReal);
                        const cantCortes = cortes.length;

                        // ACÁ ESTÁ EL CAMBIO: Se agregó "bloqueo" a la lista del rival. 
                        // Cualquier otra cosa (como "salidas") cae automáticamente como acción tuya.
                        const esDeRival = cat.includes("contra") || cat.includes("rival") || cat.includes("perdida") || cat.includes("bloqueo");

                        if (esDeRival) accionesRivales += cantCortes;
                        else accionesNuestras += cantCortes;

                        if (cat.includes("cortos")) {
                            if (esDeRival) ccRivales += cantCortes; else ccNuestros += cantCortes;
                        }
                        else if (cat === "tiro al arco") tirosNuestrosTotal += cantCortes;
                        else if (cat === "tiro arco contra") tirosRivalesTotal += cantCortes;
                        else if (cat === "ingresos al area") ingresosNuestrosTotal += cantCortes;
                        else if (cat === "ingreso area rival") ingresosRivalesTotal += cantCortes;
                        else if (cat === "recuperaciones") recupTotal += cantCortes;
                        else if (cat === "perdidas") perdidasTotal += cantCortes;
                        else if (cat === "libres 25 a favor") libres25Nuestros += cantCortes;
                        else if (cat === "libres 25 en contra") libres25Rivales += cantCortes;
                        else if (cat === "libres 50 a favor") libres50Nuestros += cantCortes;
                        else if (cat === "libres 50 en contra") libres50Rivales += cantCortes;

                        cortes.forEach(c => {
                            let tagsLimpios = c.d ? c.d.map(t => limpiar(t)) : [];

                            if (tagsLimpios.includes("gol")) {
                                let esBotonCC = cat.includes("cortos");

                                // Como "bloqueo" ya es verdadero en esDeRival, no hace falta forzarlo acá,
                                // pero se evalúa directamente para los goles
                                if (esBotonCC) {
                                    if (esDeRival) golesContraCC++; else golesCC++;
                                } else {
                                    if (esDeRival) golesContraJugada++; else golesJugada++;
                                }
                            }

                            if (cat.includes("cortos")) {
                                if (tagsLimpios.includes("directo")) {
                                    if (esDeRival) ccRivalesTipos['directo']++; else ccNuestrosTipos['directo']++;
                                }
                                if (tagsLimpios.includes("jugado")) {
                                    if (esDeRival) ccRivalesTipos['jugado']++; else ccNuestrosTipos['jugado']++;
                                }
                            }

                            if (cat === "tiro al arco") {
                                if (tagsLimpios.includes("gol")) tirosNuestrosResultado['gol']++;
                                else if (tagsLimpios.includes("atajado") || tagsLimpios.includes("atajada")) tirosNuestrosResultado['atajada']++;
                                else if (tagsLimpios.includes("afuera") || tagsLimpios.includes("error")) tirosNuestrosResultado['afuera']++;
                            }
                            if (cat === "tiro arco contra") {
                                if (tagsLimpios.includes("gol")) tirosRivalesResultado['gol']++;
                                else if (tagsLimpios.includes("atajado") || tagsLimpios.includes("atajada")) tirosRivalesResultado['atajada']++;
                                else if (tagsLimpios.includes("afuera") || tagsLimpios.includes("error")) tirosRivalesResultado['afuera']++;
                            }

                            if (cat === "ingresos al area") {
                                if (tagsLimpios.includes("flick")) ingresosNuestrosTipo['flick']++;
                                else if (tagsLimpios.includes("pentracion") || tagsLimpios.includes("penetracion")) ingresosNuestrosTipo['penetracion']++;
                                else if (tagsLimpios.includes("pase")) ingresosNuestrosTipo['pase']++;
                            }
                            if (cat === "ingreso area rival") {
                                if (tagsLimpios.includes("flick")) ingresosRivalesTipo['flick']++;
                                else if (tagsLimpios.includes("pentracion") || tagsLimpios.includes("penetracion")) ingresosRivalesTipo['penetracion']++;
                                else if (tagsLimpios.includes("pase")) ingresosRivalesTipo['pase']++;
                            }

                            if (cat === "recuperaciones") {
                                let tieneZona = false;
                                tagsLimpios.forEach(t => {
                                    if (t === "c1" || t === "c2" || t === "c3" || t === "c4") {
                                        recupZonas[t.toUpperCase()]++; tieneZona = true;
                                    }
                                });
                                if (!tieneZona) recupZonas['Sin zona']++;
                            }

                            if (cat === "perdidas") {
                                let tieneZona = false;
                                tagsLimpios.forEach(t => {
                                    if (t === "c1" || t === "c2" || t === "c3" || t === "c4") {
                                        perdidasZonas[t.toUpperCase()]++; tieneZona = true;
                                    }
                                });
                                if (!tieneZona) perdidasZonas['Sin zona']++;
                            }
                        });
                    }

                    let totalAccionesPartido = accionesNuestras + accionesRivales;
                    let posNuestraPct = 0; let posRivalPct = 0;
                    if (totalAccionesPartido > 0) {
                        posNuestraPct = Math.round((accionesNuestras / totalAccionesPartido) * 100);
                        posRivalPct = 100 - posNuestraPct;
                    }

                    let golesTotalesNuestros = golesCC + golesJugada;
                    let golesTotalesRivales = golesContraCC + golesContraJugada;

                    const contenedor = document.getElementById('panel-estadisticas');

                    let colNuestra = `
                        <div class="columna-equipo">
                            <h2 class="titulo-nuestro">${eq1.toUpperCase()}</h2>

                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(posNuestraPct, posRivalPct)}">
                                    <span class="stat-title">Posesión Total</span>
                                    <span class="stat-total">${posNuestraPct}%</span>
                                </div>
                            </div>
                            
                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(golesTotalesNuestros, golesTotalesRivales)}">
                                    <span class="stat-title">Goles</span>
                                    <span class="stat-total">${golesTotalesNuestros}</span>
                                </div>
                                <div class="stat-row ${win(golesJugada, golesContraJugada)}"><span class="label">De Jugada</span><span class="value">${golesJugada}</span></div>
                                <div class="stat-row ${win(golesCC, golesContraCC)}"><span class="label">De Córner Corto</span><span class="value">${golesCC}</span></div>
                            </div>

                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(ccNuestros, ccRivales)}">
                                    <span class="stat-title">Córner Cortos a Favor</span>
                                    <span class="stat-total">${ccNuestros}</span>
                                </div>
                                <div class="stat-row ${win(ccNuestrosTipos['directo'], ccRivalesTipos['directo'])}"><span class="label">Directos</span><span class="value">${ccNuestrosTipos['directo']}</span></div>
                                <div class="stat-row ${win(ccNuestrosTipos['jugado'], ccRivalesTipos['jugado'])}"><span class="label">Jugados</span><span class="value">${ccNuestrosTipos['jugado']}</span></div>
                            </div>

                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(ingresosNuestrosTotal, ingresosRivalesTotal)}">
                                    <span class="stat-title">Ingresos al Área</span>
                                    <span class="stat-total">${ingresosNuestrosTotal}</span>
                                </div>
                                <div class="stat-row ${win(ingresosNuestrosTipo['pase'], ingresosRivalesTipo['pase'])}"><span class="label">Pase</span><span class="value">${ingresosNuestrosTipo['pase']}</span></div>
                                <div class="stat-row ${win(ingresosNuestrosTipo['penetracion'], ingresosRivalesTipo['penetracion'])}"><span class="label">Penetración</span><span class="value">${ingresosNuestrosTipo['penetracion']}</span></div>
                                <div class="stat-row ${win(ingresosNuestrosTipo['flick'], ingresosRivalesTipo['flick'])}"><span class="label">Flick</span><span class="value">${ingresosNuestrosTipo['flick']}</span></div>
                            </div>

                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(tirosNuestrosTotal, tirosRivalesTotal)}">
                                    <span class="stat-title">Tiros al Arco</span>
                                    <span class="stat-total">${tirosNuestrosTotal}</span>
                                </div>
                                <div class="stat-row ${win(tirosNuestrosResultado['gol'], tirosRivalesResultado['gol'])}"><span class="label">Terminó en Gol</span><span class="value">${tirosNuestrosResultado['gol']}</span></div>
                                <div class="stat-row ${win(tirosNuestrosResultado['atajada'], tirosRivalesResultado['atajada'])}"><span class="label">Atajadas</span><span class="value">${tirosNuestrosResultado['atajada']}</span></div>
                                <div class="stat-row ${win(tirosNuestrosResultado['afuera'], tirosRivalesResultado['afuera'])}"><span class="label">Afuera</span><span class="value">${tirosNuestrosResultado['afuera']}</span></div>
                            </div>
                            
                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(libres25Nuestros + libres50Nuestros, libres25Rivales + libres50Rivales)}">
                                    <span class="stat-title">Tiros Libres a Favor</span>
                                    <span class="stat-total">${libres25Nuestros + libres50Nuestros}</span>
                                </div>
                                <div class="stat-row ${win(libres25Nuestros, libres25Rivales)}"><span class="label">Libres de 25</span><span class="value">${libres25Nuestros}</span></div>
                                <div class="stat-row ${win(libres50Nuestros, libres50Rivales)}"><span class="label">Libres de 50</span><span class="value">${libres50Nuestros}</span></div>
                            </div>

                            <div class="stat-card card-nuestro">
                                <div class="stat-header ${win(recupTotal, perdidasTotal)}">
                                    <span class="stat-title">Recuperaciones (Quites)</span>
                                    <span class="stat-total">${recupTotal}</span>
                                </div>
                    `;
                    ['C1', 'C2', 'C3', 'C4'].forEach(zona => {
                        colNuestra += `<div class="stat-row ${win(recupZonas[zona], perdidasZonas[zona])}"><span class="label">En Zona ${zona}</span><span class="value">${recupZonas[zona]}</span></div>`;
                    });
                    colNuestra += `</div></div>`;

                    let colRival = `
                        <div class="columna-equipo">
                            <h2 class="titulo-rival">${eq2.toUpperCase()}</h2>

                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(posRivalPct, posNuestraPct)}">
                                    <span class="stat-title">Posesión Total</span>
                                    <span class="stat-total dark">${posRivalPct}%</span>
                                </div>
                            </div>

                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(golesTotalesRivales, golesTotalesNuestros)}">
                                    <span class="stat-title">Goles</span>
                                    <span class="stat-total dark">${golesTotalesRivales}</span>
                                </div>
                                <div class="stat-row ${win(golesContraJugada, golesJugada)}"><span class="label">De Jugada</span><span class="value">${golesContraJugada}</span></div>
                                <div class="stat-row ${win(golesContraCC, golesCC)}"><span class="label">De Córner Corto</span><span class="value">${golesContraCC}</span></div>
                            </div>

                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(ccRivales, ccNuestros)}">
                                    <span class="stat-title">Córner Cortos en Contra</span>
                                    <span class="stat-total dark">${ccRivales}</span>
                                </div>
                                <div class="stat-row ${win(ccRivalesTipos['directo'], ccNuestrosTipos['directo'])}"><span class="label">Directos</span><span class="value">${ccRivalesTipos['directo']}</span></div>
                                <div class="stat-row ${win(ccRivalesTipos['jugado'], ccNuestrosTipos['jugado'])}"><span class="label">Jugados</span><span class="value">${ccRivalesTipos['jugado']}</span></div>
                            </div>

                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(ingresosRivalesTotal, ingresosNuestrosTotal)}">
                                    <span class="stat-title">Ingresos al Área</span>
                                    <span class="stat-total dark">${ingresosRivalesTotal}</span>
                                </div>
                                <div class="stat-row ${win(ingresosRivalesTipo['pase'], ingresosNuestrosTipo['pase'])}"><span class="label">Pase</span><span class="value">${ingresosRivalesTipo['pase']}</span></div>
                                <div class="stat-row ${win(ingresosRivalesTipo['penetracion'], ingresosNuestrosTipo['penetracion'])}"><span class="label">Penetración</span><span class="value">${ingresosNuestrosTipo['penetracion']}</span></div>
                                <div class="stat-row ${win(ingresosRivalesTipo['flick'], ingresosNuestrosTipo['flick'])}"><span class="label">Flick</span><span class="value">${ingresosRivalesTipo['flick']}</span></div>
                            </div>

                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(tirosRivalesTotal, tirosNuestrosTotal)}">
                                    <span class="stat-title">Tiros al Arco</span>
                                    <span class="stat-total dark">${tirosRivalesTotal}</span>
                                </div>
                                <div class="stat-row ${win(tirosRivalesResultado['gol'], tirosNuestrosResultado['gol'])}"><span class="label">Terminó en Gol</span><span class="value">${tirosRivalesResultado['gol']}</span></div>
                                <div class="stat-row ${win(tirosRivalesResultado['atajada'], tirosNuestrosResultado['atajada'])}"><span class="label">Atajadas (Ntras)</span><span class="value">${tirosRivalesResultado['atajada']}</span></div>
                                <div class="stat-row ${win(tirosRivalesResultado['afuera'], tirosNuestrosResultado['afuera'])}"><span class="label">Afuera</span><span class="value">${tirosRivalesResultado['afuera']}</span></div>
                            </div>
                            
                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(libres25Rivales + libres50Rivales, libres25Nuestros + libres50Nuestros)}">
                                    <span class="stat-title">Tiros Libres en Contra</span>
                                    <span class="stat-total dark">${libres25Rivales + libres50Rivales}</span>
                                </div>
                                <div class="stat-row ${win(libres25Rivales, libres25Nuestros)}"><span class="label">Libres de 25</span><span class="value">${libres25Rivales}</span></div>
                                <div class="stat-row ${win(libres50Rivales, libres50Nuestros)}"><span class="label">Libres de 50</span><span class="value">${libres50Rivales}</span></div>
                            </div>

                            <div class="stat-card card-rival">
                                <div class="stat-header ${win(perdidasTotal, recupTotal)}">
                                    <span class="stat-title">Recuperaciones (Pérdidas Ntras)</span>
                                    <span class="stat-total dark">${perdidasTotal}</span>
                                </div>
                    `;
                    ['C1', 'C2', 'C3', 'C4'].forEach(zona => {
                        colRival += `<div class="stat-row ${win(perdidasZonas[zona], recupZonas[zona])}"><span class="label">En Zona ${zona}</span><span class="value">${perdidasZonas[zona]}</span></div>`;
                    });
                    colRival += `</div></div>`;

                    contenedor.innerHTML = colNuestra + colRival;
                }
            } catch (error) {
                console.error("Error al cargar estadísticas:", error);
                document.getElementById('header-rival').textContent = "Error al cargar los datos.";
            }
        }

        cargarPanel();
    </script>
</body>

</html>
