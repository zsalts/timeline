<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - Timeline</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="../assets/image/logo-web.png">
    <link rel="apple-touch-icon" href="../assets/image/logo-web.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/utils/tema.js"></script>
    <style>
        body.app-shell .container-dashboard { max-width: 1080px; }

        .header-stats { margin-bottom: 22px; }
        .header-stats h2 { font-size: 1.6rem; margin: 6px 0 4px; letter-spacing: -0.02em; }

        /* --- Resumen (KPIs) --- */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 26px;
        }
        .kpi {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px 16px;
        }
        .kpi-valor {
            font-family: var(--font-mono);
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            color: var(--accent);
        }
        .kpi-label {
            display: block;
            margin-top: 7px;
            font-family: var(--font-mono);
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--muted);
        }

        /* --- Métricas del partido (según mapeo del club) --- */
        .metricas { margin-bottom: 26px; }
        .metrica-pos {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 12px;
        }
        .metrica-label {
            font-family: var(--font-mono);
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .pos-cifras {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .pos-cifras .lado-n { color: var(--accent); }
        .pos-cifras .lado-r { color: var(--muted); }
        .pos-bar {
            display: flex;
            height: 16px;
            border-radius: 6px;
            overflow: hidden;
            background: var(--panel-3);
        }
        .pos-seg-n { background: var(--accent); }
        .pos-seg-r { background: var(--panel-3); }

        .metricas-num {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px;
        }
        .metrica {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 16px 18px;
        }
        .metrica-valor {
            font-family: var(--font-mono);
            font-size: 2.3rem;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
        }
        .zonas { margin-top: 14px; }
        .zona-row {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 3px 0;
        }
        .zona-nombre { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); }
        .zona-valor { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text); }

        .aviso-config {
            background: var(--accent-dim);
            border: 1px solid var(--accent-line);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 26px;
            font-size: 0.9rem;
            color: var(--text);
        }
        .aviso-config a { color: var(--accent); font-weight: 600; }

        /* --- Distribución por categoría --- */
        .seccion-titulo {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin: 0 0 14px;
        }
        .seccion-titulo h3 { margin: 0; font-size: 1.05rem; font-weight: 700; }
        .seccion-titulo .hint {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--faint);
        }

        .cat-block {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
        }
        .cat-block > summary { list-style: none; cursor: pointer; padding: 13px 16px; display: block; }
        .cat-block > summary::-webkit-details-marker { display: none; }
        .cat-block > summary:hover { background: var(--panel-2); }

        .cat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
        .cat-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
        .cat-name { font-weight: 700; font-size: 0.98rem; }
        .cat-metrics { margin-left: auto; font-family: var(--font-mono); font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
        .cat-metrics b { color: var(--text); font-size: 1.05rem; }
        .cat-chevron { color: var(--faint); font-size: 0.75rem; margin-left: 4px; transition: transform 0.15s; }
        .cat-block[open] .cat-chevron { transform: rotate(90deg); }

        .barra { height: 8px; background: var(--panel-3); border-radius: 5px; overflow: hidden; }
        .barra-fill { height: 100%; border-radius: 5px; min-width: 3px; transition: width 0.3s; }

        .desc-list { padding: 4px 16px 14px; border-top: 1px solid var(--line); }
        .desc-list-titulo {
            font-family: var(--font-mono); font-size: 0.64rem; text-transform: uppercase;
            letter-spacing: 0.13em; color: var(--faint); margin: 12px 0 8px;
        }
        .desc-row {
            display: grid; grid-template-columns: minmax(90px, 0.9fr) 1.6fr auto;
            align-items: center; gap: 10px; padding: 4px 0;
        }
        .desc-label { font-size: 0.82rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .desc-label.sin { font-style: italic; color: var(--faint); }
        .desc-valor { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text); text-align: right; white-space: nowrap; }
        .desc-valor .pct { color: var(--faint); font-size: 0.72rem; margin-left: 5px; }

        .estado-vacio {
            text-align: center; color: var(--muted); font-weight: 600; padding: 40px 20px;
            background: var(--panel); border: 1px dashed var(--line-2); border-radius: var(--radius);
        }
    </style>
</head>

<body>

    <div id="sidebar-root" data-active="estadisticas"></div>
    <script src="../assets/js/components/ui.js"></script>

    <div class="container-dashboard">
        <div class="header-stats">
            <div class="eyebrow">Análisis de partido</div>
            <h2 id="header-titulo">Estadísticas</h2>
            <p class="subtitle" id="header-sub">Resumen de los cortes cargados</p>
        </div>

        <div id="resumen" class="kpi-row"></div>

        <div id="aviso-config" class="aviso-config" style="display:none;"></div>
        <div id="metricas" class="metricas" style="display:none;"></div>

        <div class="seccion-titulo">
            <h3>Distribución por categoría</h3>
            <span class="hint" id="hint-orden"></span>
        </div>
        <div id="distribucion"></div>
    </div>

    <!-- Módulo compartido: color estable por categoría (mismo que el timeline) -->
    <script src="../assets/js/components/timeline.js"></script>

    <script type="module">
        const uid = sessionStorage.getItem('usuarioUID');
        if (!uid) {
            // Si no está logueado, lo mandamos al login
            window.location.href = "login.html";
        }
        // Las estadísticas son análisis del cuerpo técnico: las jugadoras no acceden ni por URL.
        if (sessionStorage.getItem('userRole') === 'player') {
            window.location.href = "historial.html";
        }
        import { db, doc, getDoc } from '../assets/js/firebase.js';

        const clubId = sessionStorage.getItem('clubID');

        function fmtTiempo(seg) {
            if (!isFinite(seg) || seg < 0) return '—';
            const m = Math.floor(seg / 60);
            const s = Math.floor(seg % 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // Detecta la zona de cancha (C1–C4) desde los descriptores de un corte.
        // Acepta variantes: "C1", "Campo 1", "Cancha 2", "Zona 3", o solo "4".
        function detectarZona(ds) {
            for (const raw of (ds || [])) {
                const s = (raw || '').toLowerCase().normalize('NFD')
                    .replace(/[̀-ͯ]/g, '').replace(/\s+/g, '');
                const m = s.match(/^(?:c|campo|cancha|zona)?([1-4])$/);
                if (m) return 'C' + m[1];
            }
            return null;
        }

        // Análisis genérico (para la distribución por categoría). No asume nombres.
        function analizar(est) {
            const cats = [];
            let total = 0;
            const descsGlobal = new Set();
            let minT = Infinity, maxT = -Infinity;

            for (const [nombre, cortes] of Object.entries(est)) {
                const lista = cortes || [];
                const n = lista.length;
                total += n;
                const descCount = {};
                let sinDesc = 0;
                lista.forEach(c => {
                    if (typeof c.t === 'number' && isFinite(c.t)) {
                        if (c.t < minT) minT = c.t;
                        if (c.t > maxT) maxT = c.t;
                    }
                    const ds = (c.d || []).map(x => (x || '').trim()).filter(x => x !== '');
                    if (ds.length === 0) sinDesc++;
                    else new Set(ds).forEach(d => { descCount[d] = (descCount[d] || 0) + 1; descsGlobal.add(d); });
                });
                cats.push({ nombre, n, descCount, sinDesc });
            }
            cats.sort((a, b) => b.n - a.n || a.nombre.localeCompare(b.nombre));
            return { cats, total, descsUnicos: descsGlobal.size, minT, maxT };
        }

        // Métricas semánticas según el mapeo del club:
        //   mapeo.categorias[cat] = { lado: 'nuestro'|'rival', rol: ''|'recuperacion'|'perdida'|'corto' }
        function calcularMetricas(est, mapeo) {
            const cat = (mapeo && mapeo.categorias) || {};
            let cortesNuestros = 0, cortesRival = 0;
            let recuperaciones = 0, perdidas = 0, cortos = 0;
            const zonas = { C1: 0, C2: 0, C3: 0, C4: 0, sin: 0 };

            for (const [nombre, cortes] of Object.entries(est)) {
                const m = cat[nombre] || { lado: 'nuestro', rol: '' };
                const n = (cortes || []).length;
                if (m.lado === 'rival') cortesRival += n; else cortesNuestros += n;

                if (m.rol === 'recuperacion') recuperaciones += n;
                else if (m.rol === 'corto') cortos += n;
                else if (m.rol === 'perdida') {
                    perdidas += n;
                    (cortes || []).forEach(c => {
                        const z = detectarZona(c.d);
                        if (z) zonas[z]++; else zonas.sin++;
                    });
                }
            }
            const totalAcc = cortesNuestros + cortesRival;
            const posNuestra = totalAcc ? Math.round((cortesNuestros / totalAcc) * 100) : 0;
            return { cortesNuestros, cortesRival, posNuestra, posRival: 100 - posNuestra, recuperaciones, perdidas, cortos, zonas };
        }

        // ¿El mapeo aporta algo? (al menos una métrica asignada o un lado rival)
        function mapeoUtil(mapeo) {
            const cat = (mapeo && mapeo.categorias) || {};
            return Object.values(cat).some(m => m.rol || m.lado === 'rival');
        }

        function tileKPI(valor, label) {
            return `<div class="kpi"><div class="kpi-valor">${valor}</div><span class="kpi-label">${label}</span></div>`;
        }

        function bloqueCategoria(cat, total) {
            const color = TL.timeline.colorCategoria(cat.nombre);
            const pct = total > 0 ? Math.round((cat.n / total) * 100) : 0;
            const filas = Object.entries(cat.descCount).sort((a, b) => b[1] - a[1]);
            if (cat.sinDesc > 0) filas.push(['__sin__', cat.sinDesc]);

            let cuerpo;
            if (filas.length === 0) {
                cuerpo = '<div class="desc-row"><span class="desc-label sin">Sin descriptores</span></div>';
            } else {
                cuerpo = filas.map(([desc, cant]) => {
                    const esSin = desc === '__sin__';
                    const pDesc = cat.n > 0 ? Math.round((cant / cat.n) * 100) : 0;
                    const etiqueta = esSin
                        ? '<span class="desc-label sin">Sin descriptor</span>'
                        : `<span class="desc-label" title="${desc}">${desc}</span>`;
                    const colorBarra = esSin ? 'var(--faint)' : color;
                    return `
                        <div class="desc-row">
                            ${etiqueta}
                            <div class="barra"><div class="barra-fill" style="width:${pDesc}%;background:${colorBarra};opacity:0.85"></div></div>
                            <span class="desc-valor">${cant}<span class="pct">${pDesc}%</span></span>
                        </div>`;
                }).join('');
            }

            return `
                <details class="cat-block">
                    <summary>
                        <div class="cat-head">
                            <span class="cat-dot" style="background:${color}"></span>
                            <span class="cat-name">${cat.nombre}</span>
                            <span class="cat-metrics"><b>${cat.n}</b> · ${pct}%<span class="cat-chevron">▶</span></span>
                        </div>
                        <div class="barra"><div class="barra-fill" style="width:${pct}%;background:${color}"></div></div>
                    </summary>
                    <div class="desc-list">
                        <div class="desc-list-titulo">Descriptores</div>
                        ${cuerpo}
                    </div>
                </details>`;
        }

        function renderMetricas(mx, eq1, eq2) {
            const cont = document.getElementById('metricas');
            const zonasHtml = ['C1', 'C2', 'C3', 'C4', 'sin'].map(z => {
                const val = mx.zonas[z];
                const pct = mx.perdidas > 0 ? Math.round((val / mx.perdidas) * 100) : 0;
                const nombre = z === 'sin' ? 'Sin zona' : `Campo ${z[1]}`;
                return `
                    <div class="zona-row">
                        <span class="zona-nombre">${nombre}</span>
                        <div class="barra"><div class="barra-fill" style="width:${pct}%;background:var(--danger);opacity:0.8"></div></div>
                        <span class="zona-valor">${val}</span>
                    </div>`;
            }).join('');

            cont.innerHTML = `
                <div class="metrica-pos">
                    <div class="metrica-label">Posesión (acciones a favor vs del rival)</div>
                    <div class="pos-cifras">
                        <span class="lado-n">${eq1} · ${mx.posNuestra}%</span>
                        <span class="lado-r">${mx.posRival}% · ${eq2}</span>
                    </div>
                    <div class="pos-bar">
                        <div class="pos-seg-n" style="width:${mx.posNuestra}%"></div>
                        <div class="pos-seg-r" style="width:${mx.posRival}%"></div>
                    </div>
                </div>
                <div class="metricas-num">
                    <div class="metrica">
                        <div class="metrica-label">Recuperaciones</div>
                        <div class="metrica-valor">${mx.recuperaciones}</div>
                    </div>
                    <div class="metrica">
                        <div class="metrica-label">Córners cortos</div>
                        <div class="metrica-valor">${mx.cortos}</div>
                    </div>
                    <div class="metrica">
                        <div class="metrica-label">Pérdidas</div>
                        <div class="metrica-valor">${mx.perdidas}</div>
                        <div class="zonas">${zonasHtml}</div>
                    </div>
                </div>`;
            cont.style.display = 'block';
        }

        async function cargarPanel() {
            const partidoId = sessionStorage.getItem('partidoSeleccionadoId');
            if (!partidoId) {
                window.location.href = "historial.html";
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "partidos", partidoId));
                if (!docSnap.exists()) {
                    document.getElementById('header-titulo').textContent = "No se encontró el partido.";
                    return;
                }

                const partido = docSnap.data();
                const eq1 = partido.mi_equipo || 'Nuestro equipo';
                const eq2 = partido.rival || 'Rival';
                document.getElementById('header-titulo').textContent = `${eq1} vs ${eq2}`;
                document.getElementById('header-sub').textContent =
                    `${partido.torneo || 'Amistoso'} · ${partido.fecha || 'sin fecha'}`;

                const est = partido.estadisticas;
                const resumen = document.getElementById('resumen');
                const distribucion = document.getElementById('distribucion');

                if (!est || Object.keys(est).length === 0) {
                    resumen.innerHTML = '';
                    document.querySelector('.seccion-titulo').style.display = 'none';
                    distribucion.innerHTML = '<div class="estado-vacio">Este partido todavía no tiene cortes cargados.</div>';
                    return;
                }

                // Resumen genérico (siempre)
                const { cats, total, descsUnicos, minT, maxT } = analizar(est);
                resumen.innerHTML =
                    tileKPI(total, 'Cortes totales') +
                    tileKPI(cats.length, 'Categorías') +
                    tileKPI(descsUnicos, 'Descriptores') +
                    tileKPI(fmtTiempo(maxT - minT), 'Ventana analizada');
                document.getElementById('hint-orden').textContent = 'Ordenado por cantidad';
                distribucion.innerHTML = cats.map(c => bloqueCategoria(c, total)).join('');

                // Métricas según mapeo del club
                let mapeo = null;
                try {
                    if (clubId) {
                        const clubSnap = await getDoc(doc(db, "clubes", clubId));
                        if (clubSnap.exists()) mapeo = clubSnap.data().mapeoEstadisticas || null;
                    }
                } catch (e) {
                    console.warn("No se pudo leer el mapeo del club:", e);
                }

                if (mapeoUtil(mapeo)) {
                    renderMetricas(calcularMetricas(est, mapeo), eq1, eq2);
                } else {
                    const aviso = document.getElementById('aviso-config');
                    aviso.innerHTML = 'Para ver <strong>posesión, recuperaciones, pérdidas y cortos</strong>, configurá una vez qué categoría de tu plantilla es cada métrica en <a href="gestion-usuarios.html">Gestión de usuarios → Estadísticas del club</a>.';
                    aviso.style.display = 'block';
                }

            } catch (error) {
                console.error("Error al cargar estadísticas:", error);
                document.getElementById('header-titulo').textContent = "Error al cargar los datos.";
            }
        }

        cargarPanel();
    </script>
</body>

</html>
