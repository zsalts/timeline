<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - Timeline</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/png" href="../assets/image/logo-web.png">
    <link rel="apple-touch-icon" href="../assets/image/logo-web.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/utils/tema.js"></script>
    <style>
        /* Tablero de una sola pantalla (sin scroll) */
        body.app-shell { overflow: hidden; }
        body.app-shell .container-dashboard {
            max-width: 1500px; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            padding: 12px 22px 16px; box-sizing: border-box;
        }
        @media (max-width: 900px) {
            body.app-shell { overflow: visible; }
            body.app-shell .container-dashboard { height: auto; overflow: visible; }
        }

        .header-stats { margin-bottom: 10px; text-align: center; flex-shrink: 0; }
        .header-stats .eyebrow { justify-content: center; display: flex; }
        .marcador {
            display: flex; align-items: center; justify-content: center; gap: 16px;
            margin: 4px 0 2px; flex-wrap: wrap;
        }
        .marcador .eq { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; }
        .marcador .eq.rival { color: var(--muted); }
        .marcador .score {
            font-family: var(--font-mono); font-weight: 800; font-size: 1.35rem;
            color: var(--accent); letter-spacing: 0.04em; white-space: nowrap;
        }
        .header-stats .subtitle { justify-content: center; font-size: 0.76rem; margin-top: 2px; }

        /* --- Resumen (KPIs) --- */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 26px;
        }
        .kpi {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px 16px;
        }
        .kpi-valor { font-family: var(--font-mono); font-size: 1.9rem; font-weight: 800; line-height: 1; color: var(--accent); }
        .kpi-label { display: block; margin-top: 7px; font-family: var(--font-mono); font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--muted); }

        /* --- Tablero de una pantalla: tira de marcador + grilla 3×2 --- */
        .metricas { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 10px; }

        .marcador-strip {
            flex-shrink: 0; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px;
        }
        .marcador-strip .head-lados {
            grid-column: 1 / -1; display: flex; justify-content: space-between;
            font-family: var(--font-mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .marcador-strip .head-lados .l-fav { color: var(--accent); }
        .marcador-strip .head-lados .l-con { color: var(--muted); }
        .mtile { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 7px 8px; text-align: center; }
        .mt-lbl { font-family: var(--font-mono); font-size: 0.54rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); margin-bottom: 3px; }
        .mt-val { font-family: var(--font-mono); font-weight: 800; font-size: 1.02rem; font-variant-numeric: tabular-nums; }
        .mt-val .fav { color: var(--accent); }
        .mt-val .con { color: var(--muted); }
        .mt-val .sep { color: var(--faint); margin: 0 4px; }

        .tablero {
            flex: 1; min-height: 0; display: grid;
            grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 10px;
        }
        @media (max-width: 900px) { .tablero { grid-template-columns: 1fr; grid-template-rows: none; } }
        .tablero .card-mapa { padding: 9px 11px; min-height: 0; display: flex; flex-direction: column; }
        .tablero .mapa-head { margin-bottom: 5px; flex-shrink: 0; }
        .tablero .mapa-label { font-size: 0.56rem; }
        .tablero .mapa-tot { font-size: 1.05rem; }
        .tablero .pitch, .tablero .area-arco { flex: 1; min-height: 0; aspect-ratio: auto; }
        .tablero .pz-val { font-size: 0.95rem; }
        .tablero .az-val { font-size: 1rem; }
        .tablero .pz-lbl { top: 3px; left: 5px; }
        .tablero .area-arco { padding: 20px 8px 8px; }
        .tablero .mapa-cap { margin-top: 5px; font-size: 0.52rem; }

        /* Barra de configuración + zonas clickeables (modo config) */
        .tablero-controls { flex-shrink: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn-edit { background: var(--panel-2); border: 1px solid var(--line-2); color: var(--text); border-radius: 8px; padding: 4px 12px; font-size: 0.72rem; cursor: pointer; font-family: var(--font-mono); width: auto; }
        .btn-edit:hover { border-color: var(--accent); }
        .tablero-controls label { font-family: var(--font-mono); font-size: 0.66rem; color: var(--muted); display: inline-flex; align-items: center; gap: 5px; margin: 0; }
        .tablero-controls select { padding: 3px 6px; font-size: 0.7rem; width: auto; }
        .edit-hint { font-family: var(--font-mono); font-size: 0.62rem; color: var(--accent); }
        .tablero.editando .pzona, .tablero.editando .azona { cursor: pointer; outline: 1px dashed rgba(247, 201, 72, 0.5); outline-offset: -2px; }
        .tablero.editando .pzona:hover, .tablero.editando .azona:hover { outline-color: var(--accent); }

        /* --- Marcador comparativo (versión vieja, no usada en el tablero) --- */
        .comp-titulos {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: baseline; gap: 12px;
            margin-bottom: 12px; font-family: var(--font-mono); font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .comp-titulos .t-fav { text-align: right; color: var(--accent); font-weight: 600; }
        .comp-titulos .t-con { text-align: left; color: var(--muted); font-weight: 600; }
        .comp-titulos .t-vs { color: var(--faint); }

        .comp { display: flex; flex-direction: column; gap: 8px; }
        .comp-row {
            display: grid; grid-template-columns: 52px 1fr 52px; align-items: center; gap: 14px;
            background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
            padding: 11px 16px;
        }
        .comp-row .v { font-family: var(--font-mono); font-weight: 800; font-size: 1.25rem; font-variant-numeric: tabular-nums; }
        .comp-row .v.fav { color: var(--accent); text-align: right; }
        .comp-row .v.con { color: var(--muted); text-align: left; }
        .comp-row .mid { text-align: center; }
        .comp-row .lbl { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }
        .comp-duel { display: flex; height: 7px; border-radius: 4px; overflow: hidden; background: var(--panel-3); }
        .comp-duel .df { background: var(--accent); }
        .comp-duel .dc { background: var(--line-2); }

        /* Mapas de cancha por zona (aparecen si el partido trae recuperaciones/pérdidas con zona) */
        .mapas { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 16px; }
        .card-mapa { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; }
        .mapa-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .mapa-label { font-family: var(--font-mono); font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--muted); }
        .mapa-tot { font-family: var(--font-mono); font-weight: 800; font-size: 1.5rem; line-height: 1; }
        .mapa-tot.recu { color: var(--live); }
        .mapa-tot.perd { color: var(--danger); }
        .pitch {
            position: relative; background: linear-gradient(180deg, #0f3b34, #0b2b27);
            border: 1.5px solid var(--line-2); border-radius: 10px; padding: 8px;
            display: grid; grid-template-rows: repeat(4, 1fr); gap: 6px; aspect-ratio: 4 / 5;
        }
        .pitch::before {
            content: ""; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
            width: 48%; height: 15%; border: 1.5px solid var(--line-2); border-top: none;
            border-radius: 0 0 999px 999px; pointer-events: none;
        }
        .pzona { position: relative; border-radius: 7px; border: 1px solid rgba(255, 255, 255, 0.06); display: flex; align-items: center; justify-content: center; }
        .pz-lbl { position: absolute; top: 6px; left: 9px; font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.08em; color: rgba(237, 245, 249, 0.5); }
        .pz-val { font-family: var(--font-mono); font-weight: 700; font-size: 1.35rem; color: #EDF5F9; }
        .pzona.zero .pz-val { color: rgba(237, 245, 249, 0.35); font-weight: 500; }
        .mapa-cap { margin-top: 10px; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.06em; color: var(--faint); text-transform: uppercase; }

        .bloque-titulo { font-size: 1.05rem; font-weight: 700; margin: 24px 0 12px; }

        /* Bloque Área: semicírculo (la "D") con 3 zonas de dónde tiraron */
        .mapas-area { grid-template-columns: minmax(260px, 460px); }
        .area-arco {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
            background: linear-gradient(180deg, #0f3b34, #0b2b27);
            border: 1.5px solid var(--line-2); border-radius: 999px 999px 12px 12px;
            padding: 30px 10px 10px; aspect-ratio: 5 / 3;
        }
        .azona { border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.06); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
        .az-val { font-family: var(--font-mono); font-weight: 700; font-size: 1.4rem; color: #EDF5F9; }
        .az-lbl { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.12em; color: rgba(237, 245, 249, 0.5); }

        /* --- Distribución por categoría --- */
        .seccion-titulo { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin: 0 0 14px; }
        .seccion-titulo h3 { margin: 0; font-size: 1.05rem; font-weight: 700; }
        .seccion-titulo .hint { font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); }

        .cat-block { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
        .cat-block > summary { list-style: none; cursor: pointer; padding: 13px 16px; display: block; }
        .cat-block > summary::-webkit-details-marker { display: none; }
        .cat-block > summary:hover { background: var(--panel-2); }
        .cat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
        .cat-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
        .cat-name { font-weight: 700; font-size: 0.98rem; }
        .cat-metrics { margin-left: auto; font-family: var(--font-mono); font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
        .cat-metrics b { color: var(--text); font-size: 1.05rem; }
        .cat-chevron { color: var(--faint); font-size: 0.75rem; margin-left: 4px; transition: transform 0.15s; }
        .cat-block[open] .cat-chevron { transform: rotate(90deg); }
        .barra { height: 8px; background: var(--panel-3); border-radius: 5px; overflow: hidden; }
        .barra-fill { height: 100%; border-radius: 5px; min-width: 3px; transition: width 0.3s; }
        .desc-list { padding: 4px 16px 14px; border-top: 1px solid var(--line); }
        .desc-list-titulo { font-family: var(--font-mono); font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--faint); margin: 12px 0 8px; }
        .desc-row { display: grid; grid-template-columns: minmax(90px, 0.9fr) 1.6fr auto; align-items: center; gap: 10px; padding: 4px 0; }
        .desc-label { font-size: 0.82rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .desc-label.sin { font-style: italic; color: var(--faint); }
        .desc-valor { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text); text-align: right; white-space: nowrap; }
        .desc-valor .pct { color: var(--faint); font-size: 0.72rem; margin-left: 5px; }

        .estado-vacio { text-align: center; color: var(--muted); font-weight: 600; padding: 40px 20px; background: var(--panel); border: 1px dashed var(--line-2); border-radius: var(--radius); }
    </style>
</head>

<body>

    <div id="sidebar-root" data-active="estadisticas"></div>
    <script src="../assets/js/components/ui.js"></script>

    <div class="container-dashboard">
        <div class="header-stats">
            <div class="eyebrow">Análisis de partido</div>
            <div class="marcador">
                <span class="eq" id="eq-nuestro">Nuestro equipo</span>
                <span class="score" id="marcador-score">–</span>
                <span class="eq rival" id="eq-rival">Rival</span>
            </div>
            <p class="subtitle" id="header-sub">Resumen de los cortes cargados</p>
        </div>

        <div id="metricas" class="metricas" style="display:none;"></div>
    </div>

    <script type="module">
        const uid = sessionStorage.getItem('usuarioUID');
        if (!uid) {
            window.location.href = "login.html";
        }
        // Las estadísticas son análisis del cuerpo técnico: las jugadoras no acceden ni por URL.
        if (sessionStorage.getItem('userRole') === 'player') {
            window.location.href = "historial.html";
        }
        import { db, doc, getDoc, updateDoc } from '../assets/js/firebase.js';

        const clubId = sessionStorage.getItem('clubID');
        const esAdmin = sessionStorage.getItem('isClubAdmin') === 'true';

        // Estado del tablero: se re-pinta al editar la config en vivo.
        let estGlobal = null, mapeoGlobal = null, eqG1 = 'Nuestro equipo', eqG2 = 'Rival', editMode = false;
        const canchaN = () => (mapeoGlobal && mapeoGlobal.tablero && mapeoGlobal.tablero.canchaZonas) || 4;
        const areaM = () => (mapeoGlobal && mapeoGlobal.tablero && mapeoGlobal.tablero.areaZonas) || 3;

        function fmtTiempo(seg) {
            if (!isFinite(seg) || seg < 0) return '—';
            const m = Math.floor(seg / 60);
            const s = Math.floor(seg % 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function norm(s) {
            return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
        }

        // Zona de cancha del corte (C1..CN): el mapeo de descriptores manda
        // (descriptor → 'c1'..'cN'); si no, cae a la detección por nombre.
        function zonaCancha(c, mapeo, N) {
            const map = (mapeo && mapeo.descriptores) || {};
            for (const d of (c.d || [])) {
                const s = map[d];
                if (typeof s === 'string' && /^c[1-9]$/.test(s) && +s.slice(1) <= N) return s.toUpperCase();
            }
            for (const raw of (c.d || [])) {
                const t = norm(raw).replace(/\s+/g, '');
                const m = t.match(/^(?:c|campo|cancha|zona)?([1-9])$/);
                if (m && +m[1] <= N) return 'C' + m[1];
            }
            return null;
        }

        // Lado de una categoría: el mapeo manual manda; si no, se detecta por el
        // nombre ("en contra" / "contra" / "rival" → del rival).
        function ladoDe(nombre, mapeo) {
            const m = mapeo && mapeo.categorias && mapeo.categorias[nombre];
            // "auto" (o sin config) → se detecta por el nombre
            if (m && (m.lado === 'nuestro' || m.lado === 'rival')) return m.lado === 'rival' ? 'contra' : 'favor';
            return /(en contra|contra|rival|recib)/.test(norm(nombre)) ? 'contra' : 'favor';
        }

        // Análisis genérico (para la distribución por categoría). No asume nombres.
        function analizar(est) {
            const cats = [];
            let total = 0;
            const descsGlobal = new Set();
            let minT = Infinity, maxT = -Infinity;

            for (const [nombre, cortes] of Object.entries(est)) {
                const lista = cortes || [];
                const n = lista.length;
                total += n;
                const descCount = {};
                let sinDesc = 0;
                lista.forEach(c => {
                    if (typeof c.t === 'number' && isFinite(c.t)) {
                        if (c.t < minT) minT = c.t;
                        if (c.t > maxT) maxT = c.t;
                    }
                    const ds = (c.d || []).map(x => (x || '').trim()).filter(x => x !== '');
                    if (ds.length === 0) sinDesc++;
                    else new Set(ds).forEach(d => { descCount[d] = (descCount[d] || 0) + 1; descsGlobal.add(d); });
                });
                cats.push({ nombre, n, descCount, sinDesc });
            }
            cats.sort((a, b) => b.n - a.n || a.nombre.localeCompare(b.nombre));
            return { cats, total, descsUnicos: descsGlobal.size, minT, maxT };
        }

        // ¿El corte es gol? El mapeo de descriptores manda (descriptor con
        // significado "gol"); si no hay config, cae al nombre "gol".
        function esGol(c, mapeo) {
            const map = (mapeo && mapeo.descriptores) || {};
            return (c.d || []).some(d => map[d] === 'gol' || norm(d) === 'gol');
        }

        // Rol/métrica de una categoría: el mapeo manda; si no, se detecta por nombre.
        function rolDe(nombre, mapeo) {
            const m = mapeo && mapeo.categorias && mapeo.categorias[nombre];
            if (m && m.rol) return m.rol;
            const s = norm(nombre);
            if (s.includes('corto') || /\bcc\b/.test(s)) return 'corto';
            if (s.includes('libre') && s.includes('25')) return 'libre25';
            if (s.includes('libre') && s.includes('50')) return 'libre50';
            if (s.includes('recuper')) return 'recuperacion';
            if (s.includes('perd')) return 'perdida';
            if (s.includes('tiro') || s.includes('shot') || s.includes('remate')) return 'tiro';
            return '';
        }

        // Zona del área del corte (A1..AM): descriptor → 'a1'..'aM'.
        function zonaArea(c, mapeo, M) {
            const map = (mapeo && mapeo.descriptores) || {};
            for (const d of (c.d || [])) {
                const s = map[d];
                if (typeof s === 'string' && /^a[1-9]$/.test(s) && +s.slice(1) <= M) return s.toUpperCase();
            }
            return null;
        }

        // Resultado de un tiro: gol / atajado / desviado (por descriptor).
        function resultadoDe(c, mapeo) {
            const map = (mapeo && mapeo.descriptores) || {};
            for (const d of (c.d || [])) {
                const s = map[d] || (norm(d) === 'gol' ? 'gol' : '');
                if (s === 'gol' || s === 'atajado' || s === 'desviado') return s;
            }
            return null;
        }

        function zonasCancha(N) { const o = { sin: 0 }; for (let i = 1; i <= N; i++) o['C' + i] = 0; return o; }
        function zonasArea(M) { const o = { sin: 0 }; for (let i = 1; i <= M; i++) o['A' + i] = 0; return o; }

        // Marcador comparativo + zonas (cancha N, área M), dirigido por la config
        // del club. Sin config, cae a detección por nombre para que igual funcione.
        function calcularComparativa(est, mapeo, N, M) {
            const MM = () => ({ favor: 0, contra: 0 });
            const T = () => ({ total: 0, gol: 0, atajado: 0, desviado: 0, zonas: zonasArea(M) });
            const Z = () => ({ total: 0, zonas: zonasArea(M) });
            const mx = {
                goles: MM(), cortos: MM(), libres25: MM(), libres50: MM(),
                recuperaciones: MM(), perdidas: MM(),
                zonasRecu: zonasCancha(N), zonasPerd: zonasCancha(N),
                tiros: { favor: T(), contra: T() },
                cortosZona: { favor: Z(), contra: Z() },
                accFavor: 0, accContra: 0
            };

            for (const [nombre, cortes] of Object.entries(est)) {
                const lista = cortes || [];
                const n = lista.length;
                const lado = ladoDe(nombre, mapeo);
                mx[lado === 'contra' ? 'accContra' : 'accFavor'] += n;

                mx.goles[lado] += lista.filter(c => esGol(c, mapeo)).length;

                const rol = rolDe(nombre, mapeo);
                if (rol === 'corto') {
                    mx.cortos[lado] += n;
                    const z = mx.cortosZona[lado === 'contra' ? 'contra' : 'favor'];
                    lista.forEach(c => { z.total++; const a = zonaArea(c, mapeo, M); if (a) z.zonas[a]++; else z.zonas.sin++; });
                }
                else if (rol === 'libre25') mx.libres25[lado] += n;
                else if (rol === 'libre50') mx.libres50[lado] += n;
                else if (rol === 'recuperacion') {
                    mx.recuperaciones[lado] += n;
                    if (lado === 'favor') lista.forEach(c => { const z = zonaCancha(c, mapeo, N); if (z) mx.zonasRecu[z]++; else mx.zonasRecu.sin++; });
                } else if (rol === 'perdida') {
                    mx.perdidas[lado] += n;
                    if (lado === 'favor') lista.forEach(c => { const z = zonaCancha(c, mapeo, N); if (z) mx.zonasPerd[z]++; else mx.zonasPerd.sin++; });
                } else if (rol === 'tiro') {
                    const t = mx.tiros[lado === 'contra' ? 'contra' : 'favor'];
                    lista.forEach(c => {
                        t.total++;
                        const a = zonaArea(c, mapeo, M); if (a) t.zonas[a]++; else t.zonas.sin++;
                        const r = resultadoDe(c, mapeo);
                        if (r === 'gol') t.gol++; else if (r === 'atajado') t.atajado++; else if (r === 'desviado') t.desviado++;
                    });
                }
            }
            const tot = mx.accFavor + mx.accContra;
            mx.posFavor = tot ? Math.round((mx.accFavor / tot) * 100) : 0;
            mx.posContra = 100 - mx.posFavor;
            return mx;
        }

        function tileKPI(valor, label) {
            return `<div class="kpi"><div class="kpi-valor">${valor}</div><span class="kpi-label">${label}</span></div>`;
        }

        // Fila comparativa: valor a favor | barra doble | valor en contra
        function filaComp(label, favor, contra) {
            const tot = favor + contra;
            const pf = tot ? Math.round((favor / tot) * 100) : 50;
            return `
                <div class="comp-row">
                    <div class="v fav">${favor}</div>
                    <div class="mid">
                        <div class="lbl">${label}</div>
                        <div class="comp-duel"><div class="df" style="width:${pf}%"></div><div class="dc" style="width:${100 - pf}%"></div></div>
                    </div>
                    <div class="v con">${contra}</div>
                </div>`;
        }

        function pitchZonas(zonas, rgb, N) {
            const vals = []; for (let i = 1; i <= N; i++) vals.push(zonas['C' + i]);
            const max = Math.max(...vals, 1);
            let out = '';
            for (let i = N; i >= 1; i--) {   // CN (ataque) arriba → C1 (fondo) abajo
                const v = zonas['C' + i];
                const a = v === 0 ? 0 : (0.14 + 0.6 * (v / max)).toFixed(2);
                const bg = v === 0 ? 'transparent' : `rgba(${rgb},${a})`;
                out += `<div class="pzona ${v === 0 ? 'zero' : ''}" data-zona="c${i}" style="background:${bg}"><span class="pz-lbl">C${i}</span><span class="pz-val">${v}</span></div>`;
            }
            return out;
        }

        function areaZonasHTML(zonas, rgb, M) {
            const vals = []; for (let i = 1; i <= M; i++) vals.push(zonas['A' + i]);
            const max = Math.max(...vals, 1);
            let out = '';
            for (let i = 1; i <= M; i++) {
                const v = zonas['A' + i];
                const a = v === 0 ? 0 : (0.14 + 0.6 * (v / max)).toFixed(2);
                const bg = v === 0 ? 'transparent' : `rgba(${rgb},${a})`;
                out += `<div class="azona" data-zona="a${i}" style="background:${bg}"><span class="az-val">${v}</span><span class="az-lbl">A${i}</span></div>`;
            }
            return out;
        }

        function mapaCancha(titulo, total, zonas, rgb, claseTot, N) {
            let conZona = 0; for (let i = 1; i <= N; i++) conZona += zonas['C' + i];
            let cap;
            if (total === 0) cap = 'Sin datos · mapeá tu categoría en “Estadísticas del club”';
            else if (conZona === 0) cap = editMode ? 'Tocá una zona y poné cómo la llamás' : 'Sin datos de zona · entrá a Configurar';
            else cap = 'C1 fondo → C' + N + ' ataque' + (zonas.sin ? ` · ${zonas.sin} sin zona` : '');
            return `
                <div class="card-mapa">
                    <div class="mapa-head"><span class="mapa-label">${titulo}</span><span class="mapa-tot ${claseTot}">${total}</span></div>
                    <div class="pitch" style="grid-template-rows:repeat(${N},1fr)">${pitchZonas(zonas, rgb, N)}</div>
                    <div class="mapa-cap">${cap}</div>
                </div>`;
        }

        // Bloque "Área": semicírculo (la D) con 3 zonas de dónde tiraron +
        // resumen de resultado. Se usa dos veces: tiros nuestros y del rival.
        function areaTiros(t, subtitulo, rgb, totColor, M) {
            const total = t.total || 0;
            const cap = total === 0
                ? 'Sin datos · mapeá una categoría a “Tiro al arco”'
                : `${total} tiros · ${t.gol} gol · ${t.atajado} at. · ${t.desviado} desv.` + (t.zonas.sin ? ` · ${t.zonas.sin} s/z` : '');
            return `
                <div class="card-mapa area-card">
                    <div class="mapa-head"><span class="mapa-label">${subtitulo}</span><span class="mapa-tot" style="color:${totColor}">${total}</span></div>
                    <div class="area-arco" style="grid-template-columns:repeat(${M},1fr)">${areaZonasHTML(t.zonas, rgb, M)}</div>
                    <div class="mapa-cap">${cap}</div>
                </div>`;
        }

        // Córners cortos por zona (dónde se consiguen). Misma "D" que el área.
        function areaCorner(z, subtitulo, rgb, totColor, M) {
            const total = z.total || 0;
            const cap = total === 0
                ? 'Sin datos · mapeá una categoría a “Córner corto”'
                : `${total} córners` + (z.zonas.sin ? ` · ${z.zonas.sin} s/z` : '');
            return `
                <div class="card-mapa area-card">
                    <div class="mapa-head"><span class="mapa-label">${subtitulo}</span><span class="mapa-tot" style="color:${totColor}">${total}</span></div>
                    <div class="area-arco" style="grid-template-columns:repeat(${M},1fr)">${areaZonasHTML(z.zonas, rgb, M)}</div>
                    <div class="mapa-cap">${cap}</div>
                </div>`;
        }

        function renderMetricas(mx, N, M) {
            const cont = document.getElementById('metricas');

            const tile = (lbl, fav, con) => `
                <div class="mtile">
                    <div class="mt-lbl">${lbl}</div>
                    <div class="mt-val"><span class="fav">${fav}</span><span class="sep">·</span><span class="con">${con}</span></div>
                </div>`;

            const sel = (tipo, opts, val) => `<select onchange="window.__grilla('${tipo}', this.value)">${opts.map(v => `<option value="${v}" ${v === val ? 'selected' : ''}>${v}</option>`).join('')}</select>`;
            const controls = esAdmin ? `
                <div class="tablero-controls">
                    <button class="btn-edit" onclick="window.__toggleEdit()">${editMode ? '✓ Listo' : '⚙ Configurar'}</button>
                    ${editMode ? `
                        <label>Cancha ${sel('canchaZonas', [4, 6, 8], N)}</label>
                        <label>Área ${sel('areaZonas', [3, 5], M)}</label>
                        <span class="edit-hint">Tocá una zona y poné cómo la llamás en tu plantilla</span>
                    ` : ''}
                </div>` : '';

            const strip = `
                <div class="marcador-strip">
                    <div class="head-lados"><span class="l-fav">${eqG1} · a favor</span><span class="l-con">en contra · ${eqG2}</span></div>
                    ${tile('Posesión', mx.posFavor + '%', mx.posContra + '%')}
                    ${tile('Goles', mx.goles.favor, mx.goles.contra)}
                    ${tile('Córners cortos', mx.cortos.favor, mx.cortos.contra)}
                    ${tile('Libres de 25', mx.libres25.favor, mx.libres25.contra)}
                    ${tile('Libres de 50', mx.libres50.favor, mx.libres50.contra)}
                </div>`;

            // Grilla 3×2: fila de arriba = a favor, fila de abajo = en contra.
            const tablero = `
                <div class="tablero ${editMode ? 'editando' : ''}">
                    ${mapaCancha('Recuperaciones · zona', mx.recuperaciones.favor, mx.zonasRecu, '69,214,160', 'recu', N)}
                    ${areaTiros(mx.tiros.favor, 'De dónde tiramos', '86,194,230', '#56C2E6', M)}
                    ${areaCorner(mx.cortosZona.favor, 'Córners a favor', '95,211,166', 'var(--live)', M)}
                    ${mapaCancha('Pérdidas · zona', mx.perdidas.favor, mx.zonasPerd, '255,92,99', 'perd', N)}
                    ${areaTiros(mx.tiros.contra, 'De dónde nos tiraron', '255,107,112', 'var(--danger)', M)}
                    ${areaCorner(mx.cortosZona.contra, 'Córners en contra', '255,107,112', 'var(--danger)', M)}
                </div>`;

            cont.innerHTML = controls + strip + tablero;
            cont.style.display = 'flex';
            if (editMode) wireEdit();
        }

        // Re-dibuja todo el tablero con la config actual (N/M y descriptores).
        function pintar() {
            const N = canchaN(), M = areaM();
            const mx = calcularComparativa(estGlobal, mapeoGlobal, N, M);
            document.getElementById('marcador-score').textContent = `${mx.goles.favor} – ${mx.goles.contra}`;
            renderMetricas(mx, N, M);
        }

        // En modo config, cada zona es clickeable para setear su descriptor.
        function wireEdit() {
            document.querySelectorAll('.tablero [data-zona]').forEach(el => {
                el.classList.add('editable');
                el.addEventListener('click', () => editarZona(el.getAttribute('data-zona')));
            });
        }

        async function editarZona(zonaVal) {
            mapeoGlobal = mapeoGlobal || {};
            mapeoGlobal.descriptores = mapeoGlobal.descriptores || {};
            const desc = mapeoGlobal.descriptores;
            const actuales = Object.keys(desc).filter(d => desc[d] === zonaVal);
            const entrada = prompt(`¿Qué descriptor(es) de tu plantilla van en ${zonaVal.toUpperCase()}? (separá con comas)`, actuales.join(', '));
            if (entrada === null) return;
            actuales.forEach(d => delete desc[d]);
            entrada.split(',').map(s => s.trim()).filter(Boolean).forEach(d => { desc[d] = zonaVal; });
            await guardar();
            pintar();
        }

        async function grilla(tipo, valor) {
            mapeoGlobal = mapeoGlobal || {};
            mapeoGlobal.tablero = mapeoGlobal.tablero || {};
            mapeoGlobal.tablero[tipo] = +valor;
            await guardar();
            pintar();
        }

        async function guardar() {
            if (!clubId) return;
            try {
                await updateDoc(doc(db, 'clubes', clubId), { mapeoEstadisticas: mapeoGlobal });
            } catch (e) {
                console.error('No se pudo guardar la config:', e);
                alert('No se pudo guardar. Solo el admin del club puede editar la configuración.');
            }
        }

        window.__toggleEdit = () => { editMode = !editMode; pintar(); };
        window.__grilla = grilla;

        async function cargarPanel() {
            const partidoId = sessionStorage.getItem('partidoSeleccionadoId');
            if (!partidoId) {
                window.location.href = "historial.html";
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "partidos", partidoId));
                if (!docSnap.exists()) {
                    document.getElementById('eq-nuestro').textContent = "No se encontró el partido.";
                    return;
                }

                const partido = docSnap.data();
                eqG1 = partido.mi_equipo || 'Nuestro equipo';
                eqG2 = partido.rival || 'Rival';
                document.getElementById('eq-nuestro').textContent = eqG1;
                document.getElementById('eq-rival').textContent = eqG2;
                document.getElementById('header-sub').textContent =
                    `${partido.torneo || 'Amistoso'} · ${partido.fecha || 'sin fecha'}`;

                estGlobal = partido.estadisticas;
                const metricasEl = document.getElementById('metricas');

                if (!estGlobal || Object.keys(estGlobal).length === 0) {
                    metricasEl.innerHTML = '<div class="estado-vacio">Este partido todavía no tiene cortes cargados.</div>';
                    metricasEl.style.display = 'flex';
                    return;
                }

                try {
                    if (clubId) {
                        const clubSnap = await getDoc(doc(db, "clubes", clubId));
                        if (clubSnap.exists()) mapeoGlobal = clubSnap.data().mapeoEstadisticas || null;
                    }
                } catch (e) {
                    console.warn("No se pudo leer el mapeo del club:", e);
                }

                pintar();

            } catch (error) {
                console.error("Error al cargar estadísticas:", error);
                document.getElementById('eq-nuestro').textContent = "Error al cargar los datos.";
            }
        }

        cargarPanel();
    </script>
</body>

</html>
