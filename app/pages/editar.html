<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar partido - Timeline</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/png" href="../assets/image/logo-web.png">
    <link rel="apple-touch-icon" href="../assets/image/logo-web.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/utils/tema.js"></script>
    <style>
        .lineup-box { display: flex; flex-direction: column; gap: 8px; }
        .lineup-row { display: flex; gap: 8px; align-items: center; }
        .lineup-row .lu-num { flex: 0 0 62px; text-align: center; }
        .lineup-row .lu-nombre { flex: 1 1 auto; min-width: 0; }
        .lineup-row .lu-pos { flex: 0 0 150px; min-width: 0; }
        .lineup-row .lu-del {
            flex: 0 0 auto; width: 38px; height: 40px; padding: 0;
            background: var(--panel-2); color: var(--muted);
            border: 1px solid var(--line-2); border-radius: var(--radius-sm);
            cursor: pointer; font-weight: 600; font-family: inherit;
            transition: border-color 0.15s, color 0.15s;
        }
        .lineup-row .lu-del:hover { border-color: var(--danger); color: var(--danger); }
        .lineup-head {
            display: flex; gap: 8px; font-family: var(--font-mono); font-size: 0.64rem;
            text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); padding: 0 2px;
        }
        .lineup-head .h-num { flex: 0 0 62px; text-align: center; }
        .lineup-head .h-nombre { flex: 1 1 auto; }
        .lineup-head .h-pos { flex: 0 0 150px; }
        .lineup-head .h-del { flex: 0 0 38px; }
        .btn-add-jugadora {
            align-self: flex-start; margin-top: 4px;
            background: var(--panel-2); color: var(--text);
            border: 1px dashed var(--line-2); border-radius: var(--radius-sm);
            padding: 9px 16px; cursor: pointer; font-weight: 600; font-family: inherit;
            transition: border-color 0.15s;
        }
        .btn-add-jugadora:hover { border-color: var(--accent); color: var(--accent); }
        @media (max-width: 560px) {
            .lineup-row .lu-pos, .lineup-head .h-pos { flex-basis: 96px; }
        }
    </style>
</head>

<body>

    <div id="sidebar-root" data-active="historial"></div>
    <script src="../assets/js/components/ui.js"></script>

    <div class="container-dashboard" style="max-width: 760px;">
        <div class="header-stats" style="border: none; margin-bottom: 24px;">
            <div>
                <div class="eyebrow">Editar registro</div>
                <h2>Editar partido</h2>
                <p class="subtitle">Modificá los datos. Si no subís un nuevo archivo, se mantienen las estadísticas
                    anteriores.</p>
            </div>
        </div>

        <div class="card-stat" style="display: block; cursor: default;">
            <form id="form-editar" style="display: flex; flex-direction: column; gap: 18px;">

                <div class="form-group-row">
                    <div style="flex: 1;">
                        <label>Equipo 1 (nuestra columna)</label>
                        <select id="input-mi-equipo" required style="margin-top: 6px;">
                            <option value="" disabled selected>Seleccioná un equipo</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Equipo 2 (columna rival)</label>
                        <select id="input-rival" required style="margin-top: 6px;">
                            <option value="" disabled selected>Seleccioná un equipo</option>
                        </select>
                    </div>
                </div>

                <div class="form-group-row">
                    <div style="flex: 1;">
                        <label>Torneo o categoría</label>
                        <input type="text" id="input-torneo" required style="margin-top: 6px;">
                    </div>
                    <div style="flex: 1;">
                        <label>Fecha</label>
                        <input type="date" id="input-fecha" required style="margin-top: 6px;">
                    </div>
                </div>

                <div>
                    <label>ID de YouTube</label>
                    <input type="text" id="input-youtube" required style="margin-top: 6px;">
                </div>

                <div>
                    <label style="margin-bottom: 4px;">Alineación del partido <span style="font-weight:normal; color:var(--faint); text-transform:none; letter-spacing:0;">(opcional)</span></label>
                    <p class="subtitle" style="margin: 0 0 12px; font-size: 0.85rem;">Cargá las jugadoras que jugaron. Se guarda con el partido.</p>
                    <div class="lineup-head">
                        <span class="h-num">Dorsal</span>
                        <span class="h-nombre">Nombre</span>
                        <span class="h-pos">Posición</span>
                        <span class="h-del"></span>
                    </div>
                    <div class="lineup-box" id="lineup-box"></div>
                    <button type="button" class="btn-add-jugadora" id="btn-add-jugadora">+ Agregar jugadora</button>
                    <datalist id="posiciones-hockey">
                        <option value="Arquera"></option>
                        <option value="Back"></option>
                        <option value="Volante"></option>
                        <option value="Delantera"></option>
                    </datalist>
                </div>

                <label class="upload-box" for="input-xml">
                    <span class="upload-title">Reemplazar cortes (.lgm o .xml)</span>
                    <span class="upload-sub" id="upload-filename">Opcional — solo si querés sobrescribir los cortes anteriores</span>
                    <input type="file" id="input-xml" accept=".lgm, .xml" style="display: none;">
                </label>

                <button type="submit" id="btn-submit" class="btn-primary" style="margin-top: 6px; padding: 14px;">
                    Guardar cambios
                </button>

                <p id="mensaje-estado" style="text-align: center; font-weight: 600; margin-top: 4px;"></p>
            </form>
        </div>
    </div>

    <!-- Módulo compartido de parseo de archivos (.lgm / .xml) -->
    <script src="../assets/js/utils/parsers.js"></script>

    <script type="module">
        const uid = sessionStorage.getItem('usuarioUID');
        if (!uid) {
            // Si no está logueado, lo mandamos al login
            window.location.href = "login.html";
        }
        import { db, doc, getDoc, updateDoc } from '../assets/js/firebase.js';

        const idAEditar = sessionStorage.getItem('partidoAEditarId');
        const form = document.getElementById('form-editar');
        const mensaje = document.getElementById('mensaje-estado');
        const btn = document.getElementById('btn-submit');

        let estadisticasViejas = {};

        // ---- Alineación del partido (dorsal + nombre + posición) ----
        const lineupBox = document.getElementById('lineup-box');

        function crearFilaAlineacion(j = {}) {
            const row = document.createElement('div');
            row.className = 'lineup-row';
            row.innerHTML = `
                <input class="lu-num" type="text" inputmode="numeric" placeholder="#" maxlength="3">
                <input class="lu-nombre" type="text" placeholder="Nombre de la jugadora">
                <input class="lu-pos" type="text" placeholder="Ej: Back" list="posiciones-hockey">
                <button type="button" class="lu-del" title="Quitar">✕</button>`;
            row.querySelector('.lu-num').value = j.num || '';
            row.querySelector('.lu-nombre').value = j.nombre || '';
            row.querySelector('.lu-pos').value = j.pos || '';
            row.querySelector('.lu-del').addEventListener('click', () => row.remove());
            lineupBox.appendChild(row);
            return row;
        }

        // Pinta la alineación guardada (o una fila vacía para empezar)
        function pintarAlineacion(alineacion) {
            lineupBox.innerHTML = '';
            if (Array.isArray(alineacion) && alineacion.length) {
                alineacion.forEach(j => crearFilaAlineacion(j));
            } else {
                crearFilaAlineacion();
            }
        }

        // Serializa las filas: descarta las vacías, ordena por dorsal si es número
        function leerAlineacion() {
            const filas = [...lineupBox.querySelectorAll('.lineup-row')].map(r => ({
                num: r.querySelector('.lu-num').value.trim(),
                nombre: r.querySelector('.lu-nombre').value.trim(),
                pos: r.querySelector('.lu-pos').value.trim()
            })).filter(j => j.num || j.nombre || j.pos);
            return filas;
        }

        document.getElementById('btn-add-jugadora').addEventListener('click', () => {
            crearFilaAlineacion();
        });

        // Muestra el nombre del archivo elegido dentro de la caja de subida
        document.getElementById('input-xml').addEventListener('change', (e) => {
            const nombreSpan = document.getElementById('upload-filename');
            nombreSpan.textContent = e.target.files[0]
                ? e.target.files[0].name
                : 'Opcional — solo si querés sobrescribir los cortes anteriores';
        });

        async function cargarDatosParaEditar() {
            if (!idAEditar) {
                window.location.href = "historial.html";
                return;
            }
            try {
                const docSnap = await getDoc(doc(db, "partidos", idAEditar));
                if (docSnap.exists()) {
                    const datos = docSnap.data();

                    // Llenamos los equipos del club (más los del propio partido, por si cambiaron)
                    await poblarEquipos([datos.mi_equipo, datos.rival]);

                    document.getElementById('input-mi-equipo').value = datos.mi_equipo || '';
                    document.getElementById('input-rival').value = datos.rival || '';
                    document.getElementById('input-fecha').value = datos.fecha || '';
                    document.getElementById('input-torneo').value = datos.torneo || '';
                    // Partidos viejos pueden tener el video en video_url
                    document.getElementById('input-youtube').value = datos.youtube_id || datos.video_url || '';
                    estadisticasViejas = datos.estadisticas;
                    pintarAlineacion(datos.alineacion);
                }
            } catch (error) {
                console.error("Error trayendo datos", error);
            }
        }

        // Llena los desplegables con los equipos del club + los indicados como extra
        async function poblarEquipos(extra = []) {
            const clubId = sessionStorage.getItem('clubID');
            let equipos = [];
            try {
                const snap = await getDoc(doc(db, "clubes", clubId));
                equipos = (snap.exists() && snap.data().equipos) || [];
            } catch (e) { console.error("Error cargando equipos:", e); }

            const set = new Set([...equipos, ...extra.filter(Boolean)]);
            const lista = [...set].sort((a, b) => a.localeCompare(b, 'es'));
            const selects = [document.getElementById('input-mi-equipo'), document.getElementById('input-rival')];
            selects.forEach(s => {
                lista.forEach(eq => {
                    const o = document.createElement('option');
                    o.value = eq; o.textContent = eq;
                    s.appendChild(o);
                });
            });
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = "Actualizando...";
            mensaje.style.color = "var(--muted)";
            mensaje.textContent = "Guardando cambios en la nube...";

            const file = document.getElementById('input-xml').files[0];

            const idYoutube = document.getElementById('input-youtube').value;
            const datosActualizados = {
                mi_equipo: document.getElementById('input-mi-equipo').value,
                rival: document.getElementById('input-rival').value,
                fecha: document.getElementById('input-fecha').value,
                torneo: document.getElementById('input-torneo').value,
                // Ambos campos en sincronía (las páginas leen uno u otro)
                youtube_id: idYoutube,
                video_url: idYoutube,
                alineacion: leerAlineacion(),
                modificado_el: new Date()
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = async function (evento) {
                    try {
                        const contenidoArchivo = evento.target.result;
                        datosActualizados.estadisticas = TL.parsers.procesarArchivo(contenidoArchivo);
                        await subirActualizacion(datosActualizados);
                    } catch (error) {
                        mostrarError(error);
                    }
                };
                reader.readAsText(file);
            } else {
                try {
                    await subirActualizacion(datosActualizados);
                } catch (error) {
                    mostrarError(error);
                }
            }
        });

        async function subirActualizacion(datos) {
            const docRef = doc(db, "partidos", idAEditar);
            await updateDoc(docRef, datos);
            mensaje.style.color = "var(--live)";
            mensaje.textContent = "Actualizado con éxito. Volviendo...";
            setTimeout(() => { window.location.href = "historial.html"; }, 1500);
        }

        function mostrarError(error) {
            console.error("Error:", error);
            mensaje.style.color = "var(--danger)";
            mensaje.textContent = "No se pudo actualizar. Reintentá.";
            btn.disabled = false;
            btn.textContent = "Reintentar";
        }

        pintarAlineacion();          // una fila vacía hasta que cargue el partido
        cargarDatosParaEditar();
    </script>
</body>

</html>
